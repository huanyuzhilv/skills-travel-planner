<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路书</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
:root {
  --color-primary: #2c6e6a;
  --color-primary-light: #4a9e97;
  --color-accent: #c8a962;
  --color-dark: #1a2332;
  --color-text: #2d3748;
  --color-text-light: #5a6a7e;
  --color-text-muted: #8896a7;
  --color-bg: #f7f8fa;
  --color-card: #ffffff;
  --color-border: #e8ecf0;
  --color-cream: #fbf6ec;
  --color-ink: #14202b;
  --color-gold-soft: rgba(200,169,98,0.16);
  --gradient-premium: linear-gradient(135deg, #123b3a 0%, #2c6e6a 48%, #c8a962 140%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 30px rgba(0,0,0,0.10);
  --shadow-lg: 0 16px 50px rgba(0,0,0,0.14);
  --radius: 12px;
  --radius-lg: 20px;
  --font-display: system-ui, -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
  --font-body: system-ui, -apple-system, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
}

/* 印刷纸张：与 Chrome --print-to-pdf / 系统打印对话框一致（边距可随版式再调） */
@page {
  size: A4 portrait;
  /* 略收紧默认边距，多给正文；打印机「边距」仍可在对话框里覆盖 */
  margin: 8mm;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background:
    radial-gradient(circle at 8% 4%, rgba(200,169,98,0.16), transparent 28%),
    radial-gradient(circle at 92% 0%, rgba(44,110,106,0.12), transparent 30%),
    var(--color-bg);
  color: var(--color-text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

.roadbook-container {
  max-width: 1200px;
  margin: 0 auto;
  background: var(--color-bg);
  box-shadow: 0 0 0 1px rgba(20,32,43,0.04), 0 24px 80px rgba(20,32,43,0.10);
}

/* ========== 全屏页面组件 ========== */
.page-section {
  min-height: 100vh;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.page-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.page-bg-placeholder {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #2c6e6a 0%, #1a2332 100%);
  z-index: 0;
}

.page-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(26,35,50,0.3) 0%, rgba(26,35,50,0.7) 100%);
  z-index: 1;
  /* 仅作视觉压暗，不参与点击命中；否则整层盖在 page-bg-wrap 之上，背景槽内「备选 / 编辑蒙层」无法点击（详细行程等章节大标题页常见） */
  pointer-events: none;
}

.page-content {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1100px;
  padding: 56px 40px;
  pointer-events: auto;
}

/* ========== 封面 ========== */
.cover-section {
  min-height: 100vh;
  display: flex;
  background: var(--color-card);
}

.cover-left {
  flex: 0 0 60%;
  position: relative;
  overflow: hidden;
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  box-shadow: 18px 0 60px rgba(20,32,43,0.16);
}

.cover-left img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cover-left::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(20,32,43,0.18), transparent 48%),
    linear-gradient(0deg, rgba(20,32,43,0.22), transparent 42%);
}

.cover-left .cover-img-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #3a8f87, #1a4a5e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  color: rgba(255,255,255,0.2);
  font-weight: 900;
}

.cover-right {
  flex: 0 0 40%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 50px;
  background:
    linear-gradient(180deg, rgba(251,246,236,0.78), rgba(255,255,255,0.96)),
    var(--color-card);
  position: relative;
}

.cover-right::before {
  content: '';
  position: absolute;
  top: 42px;
  right: 42px;
  width: 86px;
  height: 86px;
  border-top: 1px solid rgba(200,169,98,0.55);
  border-right: 1px solid rgba(200,169,98,0.55);
}

.cover-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  color: var(--color-accent);
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.cover-logo {
  width: 120px;
  height: auto;
  margin-bottom: 40px;
  opacity: 0.85;
}

.cover-logo-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 40px;
}

.cover-logo-wrap .cover-logo {
  margin-bottom: 0;
  display: block;
}

.cover-left > .img-wrapper {
  width: 100%;
  height: 100%;
  min-height: 280px;
}

/* 封面主图仅用 <img>，不再叠一层 background-image，避免加载时闪烁 */
.cover-left > .img-wrapper.cover-bg {
  background-image: none !important;
  background-color: #1a3d45;
}

.cover-left > .img-wrapper.cover-bg > img {
  transition: none;
  transform: none;
}

.page-bg-wrap {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover !important;
  background-position: center !important;
  background-repeat: no-repeat !important;
}

/* 避免通用 .img-wrapper 的浅灰渐变底叠在通栏背景上（否则看起来像「灰色盖住照片」）
   使用 background shorthand + !important 确保覆盖后面第 ~1740 行 .img-wrapper 的灰色渐变；
   inline style / JS 的 setProperty(..., 'important') 优先级更高，不会被此规则阻挡。 */
.page-bg-wrap.img-wrapper {
  position: absolute !important;
  inset: 0 !important;
  background: transparent !important;
}

.page-bg-wrap .page-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.textblock-section.page-section-with-bg {
  position: relative;
  overflow: hidden;
}

/* 与带 .page-content 的章节一致：卡片须在 page-overlay（z-index:1）之上，否则无法点击与编辑正文 */
.textblock-section.page-section-with-bg .textblock-card {
  position: relative;
  z-index: 2;
}

/* 费用/服务说明：无章节大背景图与替换控件，仅用淡色底衬白板 */
.textblock-section.textblock-simple-rich {
  background: linear-gradient(180deg, #eef2f6 0%,rgb(244 246 249) 100%);
}

/* 出行须知：无章节背景图，整页白底（与费用/服务的灰底区分） */
.textblock-section.textblock-notice.textblock-plain-notice {
  background: #ffffff;
}

.textblock-section.textblock-simple-rich .textblock-card {
  box-shadow: 0 8px 24px rgba(20, 32, 43, 0.08);
}

.cover-title {
  font-family: var(--font-display);
  font-size: 2.8rem;
  font-weight: 900;
  line-height: 1.2;
  color: var(--color-dark);
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.cover-meta-card {
  margin-top: 38px;
  padding: 18px 20px;
  border-radius: var(--radius);
  border: 1px solid rgba(44,110,106,0.12);
  background: rgba(255,255,255,0.68);
  color: var(--color-text-light);
  font-size: 0.88rem;
  box-shadow: var(--shadow-sm);
}

.cover-subtitle {
  font-size: 1.1rem;
  color: var(--color-text-light);
  line-height: 1.6;
  border-left: 3px solid var(--color-accent);
  padding-left: 16px;
}

/* ========== 行程亮点 ========== */
.highlights-title {
  font-family: var(--font-display);
  font-size: 2.4rem;
  font-weight: 800;
  color: #fff;
  text-align: center;
  margin-bottom: 40px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

.highlights-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: 48px;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  box-shadow: var(--shadow-lg);
  border: 1px solid rgba(255,255,255,0.72);
}

.highlights-content {
  font-size: 1.05rem;
  color: var(--color-text);
  line-height: 2;
  margin-bottom: 24px;
}

.highlights-items {
  list-style: none;
  padding: 0;
}

.highlights-items li {
  padding: 14px 0 14px 42px;
  position: relative;
  font-size: 1rem;
  color: var(--color-text);
  border-bottom: 1px solid var(--color-border);
  line-height: 1.7;
}

.highlights-items li:last-child { border-bottom: none; }

.highlights-items li::before {
  content: counter(highlight-counter, decimal-leading-zero);
  counter-increment: highlight-counter;
  position: absolute;
  left: 0;
  top: 14px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gradient-premium);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.68rem;
  font-weight: 900;
}

.highlights-items { counter-reset: highlight-counter; }

.highlights-item-text {
  display: inline-block;
  width: calc(100% - 44px);
  vertical-align: top;
}

.hl-item-del {
  display: none;
  position: absolute;
  right: 0;
  top: 12px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(200,30,30,0.45);
  background: rgba(255,255,255,0.9);
  color: #bf2020;
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
}

body.editing .hl-item-del {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.highlights-item-add {
  display: none;
  margin-top: 14px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px dashed rgba(44,110,106,0.45);
  background: rgba(44,110,106,0.06);
  color: #1f5a56;
  font-size: 0.9rem;
  cursor: pointer;
}

body.editing .highlights-item-add {
  display: inline-block;
}

/* ========== 行程表 ========== */
.itinerary-title-page .page-content {
  text-align: center;
}

/* 行程概览 / 详细行程等「章节大标题页」：轻遮罩，背景图更易辨识 */
.itinerary-title-page .page-overlay,
.chapter-title-page .page-overlay {
  background: linear-gradient(180deg, rgba(18,30,52,0.16) 0%, rgba(18,30,52,0.34) 100%);
}

.itinerary-title-page .page-bg-wrap .page-bg,
.chapter-title-page .page-bg-wrap .page-bg {
  filter: saturate(1.08) contrast(1.04) brightness(1.02);
}

.section-big-title {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  letter-spacing: 0.05em;
}

.section-big-title::after {
  content: '';
  display: block;
  width: 60px;
  height: 4px;
  background: var(--color-accent);
  margin: 20px auto 0;
  border-radius: 2px;
}

.component-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0 auto 14px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.28);
  color: rgba(255,255,255,0.92);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.component-kicker span {
  color: var(--color-accent);
  font-size: 0.72rem;
  text-transform: uppercase;
}

.textblock-card .component-kicker {
  margin-left: 0;
  background: rgba(44,110,106,0.08);
  border-color: rgba(44,110,106,0.12);
  color: var(--color-primary);
}

/* 行程表格 */
.itinerary-table-page {
  min-height: 100vh;
  background: var(--color-bg);
  padding: 64px 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.itinerary-table {
  width: 100%;
  min-width: 860px;
  max-width: 1100px;
  border-collapse: separate;
  border-spacing: 0;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  background: var(--color-card);
  border: 1px solid rgba(44,110,106,0.10);
}

.itinerary-table thead th {
  background: var(--gradient-premium);
  color: #fff;
  padding: 14px 14px;
  font-size: 0.84rem;
  font-weight: 700;
  text-align: left;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.itinerary-table tbody tr { transition: background 0.2s; }
.itinerary-table tbody tr:nth-child(even) { background: #f8fafa; }
.itinerary-table tbody tr:hover { background: #eef5f4; }

.itinerary-table tbody td {
  padding: 12px 14px;
  font-size: 0.84rem;
  color: var(--color-text);
  border-bottom: 1px solid var(--color-border);
  vertical-align: top;
  line-height: 1.6;
}

.itinerary-table tbody td:first-child {
  font-weight: 800;
  color: var(--color-primary);
  letter-spacing: 0.04em;
}

.itinerary-table tbody td.itinerary-time {
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  min-width: 5.5em;
}

/* 时间线样式 */
.timeline-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 0;
}

.tl-item {
  display: flex;
  gap: 24px;
  margin-bottom: 32px;
  position: relative;
}

.tl-item::before {
  content: '';
  position: absolute;
  left: 59px;
  top: 40px;
  bottom: -32px;
  width: 2px;
  background: linear-gradient(to bottom, var(--color-primary-light), var(--color-border));
}

.tl-item:last-child::before { display: none; }

.tl-date {
  flex: 0 0 80px;
  text-align: center;
  padding-top: 8px;
}

.tl-date .tl-day {
  display: block;
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--color-primary);
}

.tl-date .tl-datestr {
  display: block;
  font-size: 0.8rem;
  color: var(--color-text-muted);
}

.tl-dot {
  flex: 0 0 16px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--color-primary);
  border: 3px solid #fff;
  box-shadow: 0 0 0 2px var(--color-primary-light);
  margin-top: 10px;
}

.tl-content {
  flex: 1;
  background: var(--color-card);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow-sm);
}

.tl-content h4 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--color-dark);
  margin-bottom: 4px;
}

.tl-content p {
  font-size: 0.85rem;
  color: var(--color-text-light);
}

/* ========== 每日行程 ========== */
/* 有侧图时右栏图库高度上限由 --daily-right-gallery-max 控制；左栏可独立变长 */
.daily-content-page {
  min-height: 0;
  background: var(--color-card);
  padding: 0;
  display: grid;
  grid-template-columns: 3fr 2fr;
  align-items: stretch;
  border-top: 1px solid rgba(44,110,106,0.08);
}

.daily-content-page.no-right-column {
  grid-template-columns: 1fr;
}

/* 每日行程固定模板（可通过 data.layoutTemplate 指定） */
.daily-content-page.daily-layout-classic { grid-template-columns: 3fr 2fr; }
.daily-content-page.daily-layout-focus { grid-template-columns: minmax(0, 3.3fr) minmax(0, 1.7fr); }
.daily-content-page.daily-layout-gallery { grid-template-columns: minmax(0, 2.8fr) minmax(0, 2.2fr); }
.daily-content-page.daily-layout-minimal { grid-template-columns: 1fr; }

.daily-left-column {
  padding: 36px 8px 36px 36px;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background:
    linear-gradient(135deg, rgba(251,246,236,0.82), rgba(255,255,255,0.96) 38%),
    var(--color-card);
}

/* 包住顶部图片区与「添加上方图片」，便于悬浮按钮定位 */
.daily-top-zone {
  position: relative;
  margin-bottom: 18px;
}

.daily-top-images {
  display: grid;
  gap: 12px;
  margin-bottom: 0;
  height: 220px;
}

.daily-top-images.cols-1 { grid-template-columns: 1fr; }
.daily-top-images.cols-2 { grid-template-columns: 1fr 1fr; }
.daily-top-images.cols-2-hero { grid-template-columns: 2fr 1fr; }
.daily-top-images.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

.daily-top-images .img-wrapper {
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  height: 100%;
}

.daily-top-images .img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.daily-title-bar {
  background: var(--gradient-premium);
  padding: 16px 24px;
  margin: 0 0 18px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: relative;
  overflow: hidden;
  box-shadow: 0 14px 36px rgba(44,110,106,0.18);
  flex: 0 0 auto;
}

.daily-title-bar::after {
  content: '';
  position: absolute;
  top: -30px;
  right: -20px;
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
}

.daily-label {
  flex: 0 0 100%;
  color: rgba(255,255,255,0.72);
  font-size: 0.68rem;
  line-height: 1;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

.daily-head {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}

.daily-day-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 78px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.36);
  color: #fff;
  font-size: 0.84rem;
  font-weight: 800;
  letter-spacing: 0.03em;
}

.daily-title-bar .daily-date {
  font-size: 0.92rem;
  font-weight: 800;
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
}

.daily-title-bar .daily-theme {
  font-size: 1.2rem;
  font-weight: 800;
  color: #fff;
}

.daily-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 2px;
  position: relative;
  z-index: 1;
}

.daily-meta-item {
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.28);
  color: #fff;
  font-size: 0.78rem;
  line-height: 1.35;
  white-space: nowrap;
}

.daily-overview-wrap {
  margin-bottom: 16px;
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(44,110,106,0.08);
  border: 1px solid rgba(44,110,106,0.16);
}

.daily-overview-label {
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-primary);
  margin-bottom: 6px;
}

.daily-overview-text {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--color-text);
}

.daily-text {
  font-size: 0.96rem;
  color: var(--color-text);
  line-height: 1.9;
  flex: 0 1 auto;
  min-height: 0;
  white-space: pre-line;
}

.daily-right-column {
  position: relative;
  display: grid;
  gap: 8px;
  padding: 36px 24px 36px 4px;
  min-height: 100%;
  align-content: start;
  min-width: 0;
  width: 100%;
  justify-self: stretch;
}

/* 右侧图库：最多 8 张；长文时各行 1fr 均分增高（顺序与 sideImage + bottomImages 一致） */

.daily-right-gallery--1 {

  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;

  grid-column: 2;
  grid-row: 1;
}

.daily-right-gallery--3 .img-wrapper:nth-child(3) {
  grid-column: 1 / -1;
  grid-row: 2;
  min-height: 0;
  height: 100%;
  max-height: none;
  aspect-ratio: unset;
}

.daily-right-gallery--3 .img-wrapper:nth-child(1),
.daily-right-gallery--3 .img-wrapper:nth-child(2) {

/* 4：2×2 */

}

.daily-right-gallery--4 .img-wrapper {

/* 5：2×2 + 底栏 */

}

.daily-right-gallery--5 .img-wrapper:nth-child(2) {
  grid-column: 2;
  grid-row: 1;
}

.daily-right-gallery--5 .img-wrapper:nth-child(3) {
  grid-column: 1;
  grid-row: 2;
}

.daily-right-gallery--5 .img-wrapper:nth-child(4) {
  grid-column: 2;
  grid-row: 2;
}

.daily-right-gallery--5 .img-wrapper:nth-child(5) {
  grid-column: 1/-1;
  grid-row: 3;

}

/* 6：三行两列 */
.daily-right-gallery--6 {

}

.daily-right-gallery--6 .img-wrapper {
  min-height: 0;

/* 7：末行通栏 */
.daily-right-gallery--7 {

  grid-template-rows: 1fr 1fr 1fr 1fr;

}

.daily-right-gallery--7 .img-wrapper:nth-child(7) {

}

.daily-right-gallery--7 .img-wrapper {
  min-height: 0;

/* 8：四行两列 */

}

.daily-right-gallery--8 .img-wrapper {

}

  align-items: center;

}

.daily-drag-handle {

  font-size: 11px;
  font-weight: 900;
  letter-spacing: -0.06em;
  padding: 0 1px;
}
.daily-drag-handle:active {
  cursor: grabbing;
}

body.editing .daily-top-images .img-wrapper img,
body.editing .daily-right-column .img-wrapper img {
  -webkit-user-drag: none;
  user-select: none;
}

body.editing .img-wrapper.daily-dnd-source {
  opacity: 0.65;
  outline: 2px dashed rgba(44,110,106,0.75);
  outline-offset: 2px;
}
body.editing .img-wrapper.daily-dnd-over {
  outline: 2px solid rgba(44,110,106,0.95);
  outline-offset: 2px;
}

.daily-zone-add {
  display: none;
  margin-top: 10px;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px dashed rgba(44,110,106,0.45);
  background: rgba(44,110,106,0.08);

  align-items: center;
  justify-content: center;
}

/* 顶部「添加上方图片」：右下角悬浮，避免与删除按钮（右上）重叠 */
body.editing .daily-top-zone:has(.daily-top-images) .daily-zone-add[data-zone="top"] {
  position: absolute;
  top: auto;
  bottom: 10px;
  right: 10px;
  z-index: 26;
  margin-top: 0;
  border-style: solid;
  border-color: rgba(44,110,106,0.35);
  background: rgba(255,255,255,0.92);
  box-shadow: 0 6px 20px rgba(44,110,106,0.22);
  backdrop-filter: blur(8px);
}

/* 尚无顶部图片时，保留一块占位避免按钮压到标题栏 */
body.editing .daily-top-zone:not(:has(.daily-top-images)) {
  min-height: 40px;
}

body.editing .daily-img-actions,
body.editing .daily-zone-add {
  display: inline-flex;
}

/* 右侧「添加图片」：右下角悬浮，不占网格行 */
body.editing .daily-right-column .daily-zone-add[data-zone="right"] {
  position: absolute;
  bottom: 10px;
  right: 8px;
  z-index: 24;
  margin-top: 0;
  border-style: solid;
  border-color: rgba(44,110,106,0.35);
  background: rgba(255,255,255,0.92);
  box-shadow: 0 6px 20px rgba(44,110,106,0.22);
  backdrop-filter: blur(8px);
}

/* 住宿卡右侧图库：编辑态「添加图片」悬浮（与每日右栏一致） */

  position: absolute;
  bottom: 10px;
  right: 8px;
  z-index: 24;
  margin-top: 0;
  border-style: solid;
  border-color: rgba(44,110,106,0.35);
  background: rgba(255,255,255,0.92);
  box-shadow: 0 6px 20px rgba(44,110,106,0.22);
  backdrop-filter: blur(8px);
}

/* 编辑态：住宿/交通右栏与 daily 右栏底部留出条带，「+ 添加右侧图片」落在留白内，不压住末格「备选」（.img-alt-btn z-index 25） */

/* ========== 大标题背景编辑控制（z-index 高于 page-overlay / page-content） ========== */
/*
 * 问题根因：page-bg-wrap 的 z-index: 0 形成独立层叠上下文，其内部子元素
 * 无法在视觉上覆盖 z-index: 1/2 的 page-overlay / page-content，导致
 * img-alt-btn / img-edit-overlay 在背景层不可点击。
 * 解决方案：在每个带背景图的区块内渲染独立的 .bg-edit-ctrl-area，
 * 作为直接兄弟元素定位，z-index: 10，与背景 img-wrapper 同级但层级更高。
 *
 * 显示策略：非编辑模式隐藏；进入编辑模式（body.editing）后显示；导出/打印时隐藏。
 */
.bg-edit-ctrl-area {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 10;
  display: none;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  pointer-events: auto;
  opacity: 0.55;
  transition: opacity 0.2s;
}
body.editing .bg-edit-ctrl-area {
  display: flex;
  opacity: 1;
}
.bg-edit-ctrl-area:hover { opacity: 1; }
body.exporting .bg-edit-ctrl-area { display: none !important; }

.bg-edit-btn {
  padding: 6px 14px;
  background: rgba(0,0,0,0.62);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  white-space: nowrap;
  transition: background 0.15s;
}
.bg-edit-btn:hover { background: rgba(0,0,0,0.88); }

/* ========== 章节装饰大字（01 / 02 …） ========== */
.section-num-deco {
  display: block;
  font-family: var(--font-display);
  font-size: 5.5rem;
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.05em;
  color: rgba(255,255,255,0.13);

  user-select: none;
  pointer-events: none;
}

/* 工具栏 */

  display: flex;
  gap: 8px;

/* 编辑模式文本标记 */

<script>
/*TRIPDATA_START*/
const tripData = TRIP_DATA;
/*TRIPDATA_END*/

/* ========== 组件注册表 ========== */
const COMPONENT_TYPES = {
  highlights: {
    name: '行程亮点',
    icon: '01',
    description: '卖点提炼、亲子体验、行程保障',
    allowMultiple: false
  },
  itinerary: {
    name: '行程表',
    icon: '02',
    description: '时间、地点、交通、线路总览',
    allowMultiple: false
  },
  daily: {
    name: '每日介绍',
    icon: '03',
    description: '按天承载速览、正文和图片槽',
    allowMultiple: true
  },
  feature: {
    name: '特点介绍',
    icon: '04',
    description: '住宿、餐饮、交通等商业卖点',
    allowMultiple: true,
    subtypes: ['住宿', '餐饮', '交通', '摄影', '其他']
  },
  'text-block': {
    name: '文字说明',
    icon: '05',
    description: '费用、服务、规则、须知等人工确认文本',
    allowMultiple: true,
    subtypes: ['费用', '服务', '规则', '须知', '其他']
  }
};

const SUBTYPE_META = {
  '住宿': { label: '精选住宿', className: 'stay', eyebrow: 'STAY' },
  '餐饮': { label: '在地餐饮', className: 'food', eyebrow: 'TASTE' },
  '交通': { label: '交通保障', className: 'transport', eyebrow: 'TRANSFER' },
  '摄影': { label: '影像服务', className: 'photo', eyebrow: 'PHOTO' },
  '费用': { label: '费用说明', className: 'cost', eyebrow: 'PRICE' },
  '服务': { label: '服务说明', className: 'service', eyebrow: 'SERVICE' },
  '规则': { label: '预订规则', className: 'rules', eyebrow: 'POLICY' },
  /* 须知：与「服务说明」同一客户页标题与版式（导出前由 generate 合并进服务块；编辑端偶发遗留时与费用/服务一致富文本） */
  '须知': { label: '服务说明', className: 'service', eyebrow: 'SERVICE' },
  '其他': { label: '定制说明', className: 'other', eyebrow: 'INFO' }
};

/* ========== 工具函数 ========== */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/** 纯文案字段：`**加粗**` → `<strong>`（分段 HTML 转义，防 XSS）。不含其它 Markdown。 */
function escMd(s) {
  const raw = String(s ?? '');
  const parts = raw.split('**');
  if (parts.length === 1) return esc(raw);
  return parts.map((seg, i) => (i % 2 === 0 ? esc(seg) : '<strong>' + esc(seg) + '</strong>')).join('');
}

/** 已是 HTML 的正文片段：将其中的 `**…**` 转为 `<strong>`（再走 sanitize）。 */
function mdBoldSegmentsInHtml(html) {
  return String(html ?? '').replace(/\*\*([\s\S]+?)\*\*/g, (_, inner) => '<strong>' + esc(inner) + '</strong>');
}

/** 保存 tripData：DOM 内 `<strong>/<b>` 还原为 `**…**`（与 escMd 对称）。 */
function htmlInlineToMarkdownBold(el) {
  if (!el) return '';
  let out = '';
  el.childNodes.forEach((node) => {
    if (node.nodeType === Node.TEXT_NODE) out += node.textContent;
    else if (node.nodeType === Node.ELEMENT_NODE) {
      const t = node.tagName.toLowerCase();
      if (t === 'strong' || t === 'b') out += '**' + htmlInlineToMarkdownBold(node) + '**';
      else if (t === 'br') out += '\n';
      else out += htmlInlineToMarkdownBold(node);
    }
  });
  return out;
}

/** 路书富文本：渲染前剔除危险标签与事件属性（数据来自本方 tripData / 人工编辑） */
function sanitizeRoadbookRichHtml(html) {
  const raw = String(html ?? '').trim();
  if (!raw) return '';
  const tpl = document.createElement('template');
  tpl.innerHTML = raw;
  tpl.content.querySelectorAll('script,iframe,object,embed,link,meta,style,form').forEach(n => n.remove());
  tpl.content.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(attr => {
      const n = attr.name;
      const v = attr.value || '';
      if (/^on/i.test(n) || (n === 'href' && /^\s*javascript:/i.test(v))) el.removeAttribute(n);
    });
  });
  return tpl.innerHTML.trim();
}

/** 将旧版 sections[] 转为纯文本行（仅用于一次性迁入单块富文本） */
function deriveTextblockLinesFromLegacySections(sections) {
  const out = [];
  if (!Array.isArray(sections)) return out;
  for (const sec of sections) {
    const h = String(sec.heading || '').trim();
    const body = String(sec.body || '').trim();
    if (!body && !h) continue;
    const parts = body.split(/[；;\n\r]+/).map(s => s.trim()).filter(Boolean);
    if (!parts.length) {
      if (h) out.push(h);
      continue;
    }
    parts.forEach((p, i) => {
      if (i === 0 && h) out.push(`${h}：${p}`);
      else out.push(p);
    });
  }
  return out;
}

/** 费用/服务：合并 lines·sections·content 为单一富文本 HTML（编辑区整页一大块） */
function buildSimpleRichEditorInnerHtml(d) {
  const rawContent = d.content != null ? String(d.content).trim() : '';
  let lines = Array.isArray(d.lines) ? d.lines.map(x => String(x).trim()).filter(Boolean) : [];
  if (!lines.length) {
    lines = deriveTextblockLinesFromLegacySections(Array.isArray(d.sections) ? d.sections : []);
  }
  const listPart = lines.length
    ? `<ul class="textblock-lines textblock-rich-bullets">${lines.map(line => `<li>${escMd(line)}</li>`).join('')}</ul>`
    : '';
  if (listPart && rawContent) return listPart + mdBoldSegmentsInHtml(rawContent);
  if (rawContent) return mdBoldSegmentsInHtml(rawContent);
  if (listPart) return listPart;
  return '';
}

/** 费用/服务/须知：正文合并为单块富文本（须知在交付侧已并入服务说明块；此处保证遗留数据版式与费用/服务一致） */
function isTextblockMergedRichSubtype(subtype) {
  return subtype === '费用' || subtype === '服务' || subtype === '须知';
}

/** 生成 CSS background-image 可用的 url('…')，避免在 HTML style 属性里用 &quot; 嵌套导致部分浏览器不渲染 */
function cssBgUrlValue(src) {
  if (!src) return 'none';
  const s = String(src).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  return `url('${s}')`;
}

function cssUrlStyle(url) {
  const u = String(url || '').trim();
  if (!u) return '';
  return ` style="background-image: ${cssBgUrlValue(u)} !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important;"`;
}

function getSubtypeMeta(subtype) {
  return SUBTYPE_META[subtype] || SUBTYPE_META['其他'];
}

function renderComponentKicker(label, eyebrow) {
  if (!label && !eyebrow) return '';
  return `<div class="component-kicker"><span>${escMd(eyebrow || 'CUSTOM')}</span>${escMd(label || '')}</div>`;
}

function normalizeClassName(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-')
    .replace(/^-+|-+$/g, '') || 'custom';
}

/** 图片槽 JSON 路径 → 可读标签（便于按「地点/字段」识别素材槽位） */
function humanizeSlotPath(path) {
  if (!path) return '图片槽';
  const p = String(path).replace(/^\//, '');
  const parts = p.split('/').filter(Boolean);
  const map = {
    backgroundImage: '背景图',
    topImages: '顶部配图',
    bottomImages: '底部配图',
    sideImage: '侧栏大图',
    logo: 'Logo',
    cover: '封面',
    images: '配图',
    items: '条目'
  };
  const readable = parts.map(seg => map[seg] || (/^\d+$/.test(seg) ? `#${parseInt(seg, 10) + 1}` : seg)).join(' · ');
  return readable || path;
}

/** 从条目解析出 URL（备选列表始终为纯字符串 URL） */
function extractImageUrl(item) {
  if (item == null || item === '') return '';
  if (typeof item === 'string') return item.trim();
  if (typeof item === 'object' && !Array.isArray(item)) {
    const u = item.url || item.src || item.href;
    return typeof u === 'string' ? u.trim() : '';
  }
  return '';
}

function extractSlotLabel(item) {
  if (item != null && typeof item === 'object' && !Array.isArray(item)) {
    const sl = item.slotLabel || item.label || item.placeName;
    return typeof sl === 'string' ? sl.trim() : '';
  }
  return '';
}

function uniqueUrls(urls) {
  const out = [];
  const seen = new Set();
  for (const raw of (Array.isArray(urls) ? urls : [])) {
    const u = String(raw || '').trim();
    if (!u || seen.has(u)) continue;
    seen.add(u);
    out.push(u);
  }
  return out;
}

/** 空槽（仅占位、无有效主图）：装饰时自动从同组其余槽同步备选，右下角与有图槽一致显示「备选」 */
function isEmptySlotForPoolAlts(wrap) {
  if (!wrap) return false;
  if (wrap.querySelector(':scope > .img-placeholder')) return true;
  const img = wrap.querySelector(':scope > img');
  if (!img) return true;
  const src = String(img.getAttribute('src') || '').trim();
  return !src;
}

function collectUrlsFromImageWrapperForPool(wrap) {
  const out = [];
  const img = wrap.querySelector(':scope > img');
  if (img) {
    const s = String(img.getAttribute('src') || img.src || '').trim();
    if (s) out.push(s);
  }
  try {
    const alts = JSON.parse(wrap.dataset.alts || '[]');
    if (Array.isArray(alts)) {
      for (const u of alts) {
        if (u) out.push(String(u).trim());
      }
    }
  } catch (_) { /* ignore */ }
  return uniqueUrls(out);
}

/** 空槽：将同组（住宿/交通 gallery、每日顶部图区、每日右栏）其余槽的主图与备选写入本槽 data-alts，右下角显示「备选」 */
function syncEmptySlotAltsFromSiblings(wrapper) {
  if (!isEmptySlotForPoolAlts(wrapper)) return;
  const gallery = wrapper.closest('.feature-hotel-gallery');
  const rightCol = wrapper.closest('.daily-right-column');
  const topZone = wrapper.closest('.daily-top-images');
  const container = gallery || rightCol || topZone;
  if (!container || !wrapper.classList.contains('img-wrapper')) return;
  const siblings = Array.from(container.querySelectorAll(':scope > .img-wrapper')).filter((w) => w !== wrapper);
  const pooled = [];
  siblings.forEach((w) => {
    pooled.push(...collectUrlsFromImageWrapperForPool(w));
  });
  const merged = uniqueUrls(pooled);
  wrapper.dataset.alts = JSON.stringify(merged);
  refreshAltButton(wrapper, merged);
  refreshSlotHint(wrapper);
  if (merged.length > 0) {
    applyImage(wrapper, merged[0]);
  }
}

/**
 * string | string[]（备选）
 * { url, slotLabel } | { alternates: [], slotLabel } — 与地点名绑定
 */
function normalizeImageEntry(entry) {
  const empty = { primary: '', alts: [], slotLabel: '' };
  if (entry == null || entry === '') return empty;

  if (typeof entry === 'object' && !Array.isArray(entry)) {
    const slotLabel = extractSlotLabel(entry);
    const direct = extractImageUrl(entry);
    let fromAlts = [];
    if (Array.isArray(entry.alternates)) {
      fromAlts = uniqueUrls(entry.alternates.map(extractImageUrl).filter(Boolean));
    }
    // alternates 含占位空串时不能只走备选分支，否则会丢掉同对象上的 url/src
    const urls = finalizeImageUrlList(direct ? [direct, ...fromAlts] : fromAlts);
    if (urls.length) {
      return { primary: urls[0], alts: urls, slotLabel };
    }
    return { primary: '', alts: [], slotLabel };
  }

  if (Array.isArray(entry)) {
    const urls = [];
    let slotLabel = '';
    for (const item of entry) {
      if (item == null || item === '') continue;
      const u = extractImageUrl(item);
      if (u) urls.push(u);
      if (!slotLabel) slotLabel = extractSlotLabel(item);
    }
    const unique = finalizeImageUrlList(urls);
    return { primary: unique[0] || '', alts: unique, slotLabel };
  }

  const one = finalizeImageUrlList([String(entry).trim()])[0] || '';
  return { primary: one, alts: one ? [one] : [], slotLabel: '' };
}

/** 预览服务写入的 127.0.0.1 / localhost 绝对 URL → 与 HTML 同级的 roadbook-images 相对路径 */
function resolveExportMediaUrl(src) {
  let s = String(src || '').trim();
  if (!s || s.startsWith('data:') || s.startsWith('blob:')) return s;
  const dev = s.match(/^https?:\/\/(?:127\.0\.0\.1|localhost)(?::\d+)?\/(roadbook-images\/[^?#]+)/i);
  if (dev) return dev[1];
  if (s.startsWith('/roadbook-images/')) return s.slice(1);
  try {
    const u = new URL(s, document.baseURI || window.location.href);
    const marker = '/roadbook-images/';
    const idx = u.pathname.indexOf(marker);
    if (idx >= 0) {
      const rel = u.pathname.slice(idx + 1);
      if (u.hostname === '127.0.0.1' || u.hostname === 'localhost') return rel;
      if (u.origin === window.location.origin) return rel;
    }
  } catch (_) { /* ignore */ }
  return s;
}

function roadbookPublicApiBase() {
  const cfg = window.__CRM_ROADBOOK_PREVIEW__ || {};
  const base = String(cfg.apiBase || '/api').replace(/\/$/, '');
  return base || '/api';
}

function proxyExportMediaUrl(src) {
  const s = String(src || '').trim();
  if (!s || s.startsWith('data:') || s.startsWith('blob:')) return s;
  try {
    const u = new URL(s, document.baseURI || window.location.href);
    if (!/^https?:$/i.test(u.protocol)) return s;
    if (u.pathname.includes('/api/public/roadbook/proxy-image')) return s;
    return `${roadbookPublicApiBase()}/public/roadbook/proxy-image?url=${encodeURIComponent(u.href)}`;
  } catch (_) {
    return s;
  }
}

function finalizeImageUrlList(urls) {
  const normalized = uniqueUrls((urls || []).map(resolveExportMediaUrl).filter(Boolean));
  normalized.sort((a, b) => {
    const rank = (u) => {
      if (u.startsWith('roadbook-images/')) return 0;
      if (/^https?:\/\/(?:127\.0\.0\.1|localhost)(?::\d+)?\//i.test(u)) return 2;
      return 1;
    };
    return rank(a) - rank(b);
  });
  return normalized;
}
function compositeSlotHint(path, slotLabel) {
  const p = humanizeSlotPath(path || '');
  const sl = (slotLabel || '').trim();
  return sl ? `${sl} · ${p}` : p;
}

function refreshSlotHint(wrapper) {
  if (!wrapper) return;
  const path = wrapper.dataset.path || '';
  const sl = (wrapper.dataset.slotLabel || '').trim();
  wrapper.dataset.slotHint = compositeSlotHint(path, sl);
}

function altButtonHtml(alts) {
  if (!Array.isArray(alts) || alts.length < 1) return '';
  const label = alts.length > 1 ? `备选 ${alts.length}张` : '备选';
  return `<button type="button" class="img-alt-btn" data-alts="${esc(JSON.stringify(alts))}">${label}</button>`;
}

function renderImage(entry, alt, dataPath, classes) {
  let { primary, alts, slotLabel } = normalizeImageEntry(entry);
  if (!primary && Array.isArray(alts) && alts.length) {
    primary = alts[0];
    alts = uniqueUrls([primary, ...alts]);
  }
  const cls = classes || '';
  const btn = altButtonHtml(alts);
  const da = esc(JSON.stringify(alts));
  const hint = esc(compositeSlotHint(dataPath, slotLabel));
  const dsl = slotLabel ? ` data-slot-label="${esc(slotLabel)}"` : '';
  if (primary) {
    return `<div class="img-wrapper ${cls}" data-path="${esc(dataPath || '')}" data-slot-hint="${hint}"${dsl} data-alts="${da}">
      <img src="${esc(primary)}" alt="${esc(alt || '')}" loading="lazy" decoding="async" crossorigin="anonymous" referrerpolicy="no-referrer">
      ${btn}</div>`;
  }
  return `<div class="img-wrapper ${cls}" data-path="${esc(dataPath || '')}" data-slot-hint="${hint}"${dsl} data-alts="${da}">
    <div class="img-placeholder"><span>${esc(alt || '暂无图片')}</span><small>${hint}</small></div>
    ${btn}</div>`;
}

function tryNextImage(wrapper) {
  if (!wrapper) return false;
  let img = wrapper.querySelector('img.page-bg') || wrapper.querySelector('img');
  if (!img && wrapper.classList.contains('page-bg-wrap')) {
    const ph = wrapper.querySelector('.page-bg-placeholder');
    if (ph) {
      img = document.createElement('img');
      img.className = 'page-bg';
      img.alt = '';
      img.loading = 'eager';
      img.decoding = 'async';
      ph.replaceWith(img);
    }
  }
  if (!img) return false;
  let alts = [];
  try {
    alts = JSON.parse(wrapper.dataset.alts || '[]');
  } catch (_) {
    alts = [];
  }
  const candidates = uniqueUrls(alts);
  const failed = new Set((wrapper.dataset.failedUrls || '').split('||').filter(Boolean));
  failed.add(img.src);
  wrapper.dataset.failedUrls = Array.from(failed).join('||');
  const next = candidates.find((u) => u && !failed.has(u));
  if (!next) return false;
  img.src = next;
  if (wrapper.classList.contains('page-bg-wrap') || wrapper.dataset.path === '/cover/backgroundImage') {
    wrapper.style.backgroundImage = cssBgUrlValue(next);
  }
  return true;
}

function primaryImageUrl(entry) {
  return normalizeImageEntry(entry).primary || '';
}

function isTitleBackgroundWrapper(wrapper) {
  return !!wrapper && (
    wrapper.classList.contains('page-bg-wrap') ||
    wrapper.dataset.path === '/cover/backgroundImage'
  );
}

function applyTitleBackground(wrapper, src) {
  if (!isTitleBackgroundWrapper(wrapper) || !src) return;
  wrapper.querySelectorAll('.page-bg-placeholder, .cover-img-placeholder, .img-placeholder').forEach(el => el.remove());
  const cleanSrc = String(src).trim();
  if (!cleanSrc) return;
  const coverMainImg = wrapper.dataset.path === '/cover/backgroundImage'
    ? wrapper.querySelector('img:not(.cover-logo)') : null;
  if (coverMainImg && coverMainImg.tagName === 'IMG' && !coverMainImg.classList.contains('page-bg')) {
    wrapper.style.removeProperty('background-image');
    coverMainImg.style.display = 'block';
    coverMainImg.style.opacity = '1';
    if (coverMainImg.getAttribute('src') !== cleanSrc) coverMainImg.src = cleanSrc;
    delete wrapper.dataset.failedUrls;
    wrapper.dataset.currentSrc = cleanSrc;
    return;
  }
  wrapper.style.setProperty('background-image', cssBgUrlValue(cleanSrc), 'important');
  wrapper.style.setProperty('background-size', 'cover', 'important');
  wrapper.style.setProperty('background-position', 'center', 'important');
  wrapper.style.setProperty('background-repeat', 'no-repeat', 'important');
  let bgLayer = wrapper.querySelector('.page-bg');
  if (!bgLayer) {
    const legacy = wrapper.querySelector('img');
    if (legacy && wrapper.classList.contains('page-bg-wrap') && !legacy.classList.contains('page-bg')) {
      legacy.classList.add('page-bg');
    }
    bgLayer = wrapper.querySelector('.page-bg') || wrapper.querySelector('img');
  }
  if (bgLayer) {
    if (bgLayer.tagName === 'IMG') {
      bgLayer.style.display = 'block';
      bgLayer.style.opacity = '1';
      if (bgLayer.getAttribute('src') !== cleanSrc) bgLayer.src = cleanSrc;
      delete wrapper.dataset.failedUrls;
    } else {
      bgLayer.style.backgroundImage = cssBgUrlValue(cleanSrc);
    }
  } else if (wrapper.classList.contains('page-bg-wrap')) {
    const img = document.createElement('img');
    img.className = 'page-bg';
    img.alt = '';
    img.loading = 'eager';
    img.decoding = 'async';
    img.src = cleanSrc;
    img.style.display = 'block';
    img.style.opacity = '1';
    wrapper.insertBefore(img, wrapper.firstChild);
    delete wrapper.dataset.failedUrls;
  }
  wrapper.dataset.currentSrc = cleanSrc;
}

function preloadTitleBackground(wrapper) {
  if (!isTitleBackgroundWrapper(wrapper)) return;
  // 直接取 primary（alts[0]）或 img.src，同步设置 background-image，
  // 不再用 probe 异步探测（跨域图片 onload 不可靠）。
  // <img class="page-bg"> 的 onerror 机制负责备选切换。
  const alts = getWrapperAlts(wrapper);
  const imgEl = wrapper.querySelector('img.page-bg') || wrapper.querySelector('img:not(.cover-logo)');
  const current = imgEl ? (imgEl.getAttribute('src') || '') : '';
  const primary = alts[0] || current;
  if (!primary) return;
  // 确保 img.src 已设置（renderBgImageSlot 已写入，这里做兜底）
  if (imgEl && !imgEl.getAttribute('src')) imgEl.src = primary;
  // 封面主图：仅依赖 <img>，避免 wrapper 与 img 双图层刷新导致闪烁
  if (wrapper.dataset.path === '/cover/backgroundImage' && imgEl && imgEl.tagName === 'IMG' && !imgEl.classList.contains('page-bg')) {
    return;
  }
  // 章节大标题等：同步写入 background-image，让背景立即可见
  // 使用 setProperty + important 确保不被任何 CSS 规则覆盖
  wrapper.style.setProperty('background-image', cssBgUrlValue(primary), 'important');
  wrapper.style.setProperty('background-size', 'cover', 'important');
  wrapper.style.setProperty('background-position', 'center', 'important');
  wrapper.style.setProperty('background-repeat', 'no-repeat', 'important');
}

function hydrateTitleBackgrounds() {
  document.querySelectorAll('.page-bg-wrap, .img-wrapper[data-path="/cover/backgroundImage"]').forEach(preloadTitleBackground);
}

/** 全屏/通栏背景图（page-bg）。备选 URL 在 data-alts；编辑态「备选」仅来自同区块 .bg-edit-ctrl-area，避免与右下角 .img-alt-btn 重复。 */
function renderBgImageSlot(entry, dataPath) {
  const { primary, alts, slotLabel } = normalizeImageEntry(entry);
  const da = esc(JSON.stringify(alts));
  const hint = esc(compositeSlotHint(dataPath, slotLabel));
  const dsl = slotLabel ? ` data-slot-label="${esc(slotLabel)}"` : '';
  if (primary) {
    return `<div class="page-bg-wrap img-wrapper" data-path="${esc(dataPath || '')}" data-slot-hint="${hint}"${dsl} data-alts="${da}"${cssUrlStyle(primary)}>
      <img class="page-bg" src="${esc(primary)}" alt="${esc(slotLabel || '')}" loading="eager" fetchpriority="high" decoding="async" crossorigin="anonymous" referrerpolicy="no-referrer"></div>`;
  }
  return `<div class="page-bg-wrap img-wrapper" data-path="${esc(dataPath || '')}" data-slot-hint="${hint}"${dsl} data-alts="${da}">
    <div class="page-bg-placeholder"></div></div>`;
}

/* ========== 主渲染入口 ========== */
function renderAll() {
  renderCover(tripData.cover);
  const container = document.getElementById('components-container');
  container.innerHTML = '';
  let dailyIndex = 0;
  let isFirstDaily = true;
  tripData.components.forEach((comp, idx) => {
    renderComponent(container, comp, idx, isFirstDaily);
    if (comp.type === 'daily') {
      isFirstDaily = false;
      dailyIndex++;
    }
  });
}

document.addEventListener('error', function (event) {
  const target = event.target;
  if (!(target instanceof HTMLImageElement)) return;
  const wrapper = target.closest('.img-wrapper');
  if (!wrapper) return;
  const switched = tryNextImage(wrapper);
  if (!switched) {
    // 背景图槽位失败时使用全幅背景占位，避免整页看起来“没图/发黑”
    if (wrapper.classList.contains('page-bg-wrap')) {
      const bgPh = document.createElement('div');
      bgPh.className = 'page-bg-placeholder';
      target.replaceWith(bgPh);
      return;
    }
    // 封面主图失败时保留封面风格占位
    if (wrapper.dataset.path === '/cover/backgroundImage') {
      const coverPh = document.createElement('div');
      coverPh.className = 'cover-img-placeholder';
      coverPh.textContent = '路书';
      target.replaceWith(coverPh);
      return;
    }
    const ph = document.createElement('div');
    ph.className = 'img-placeholder';
    ph.innerHTML = '<span>图片加载失败</span><small>可在编辑模式中替换或选择备选图</small>';
    target.replaceWith(ph);
  }
}, true);

/* ========== 封面渲染 ========== */
/** 客户交付版：不展示 intake / 内部编辑说明类副标题 */
function shouldOmitCoverSubtitle(text) {
  const s = String(text || '').trim();
  if (!s) return true;
  if (s === '定制旅行 · 可编辑交付版') return true;
  if (/可编辑交付|测试数据|内部测试|placeholder|草稿|\bdraft\b/i.test(s)) return true;
  return false;
}

function renderCover(cover) {
  if (!cover) return;
  const container = document.getElementById('cover-container');
  const { primary: bgPrimary, alts: bgAlts, slotLabel: bgSlot } = normalizeImageEntry(cover.backgroundImage);
  const bgDa = esc(JSON.stringify(bgAlts));
  const covHint = esc(compositeSlotHint('/cover/backgroundImage', bgSlot));
  const bgDsl = bgSlot ? ` data-slot-label="${esc(bgSlot)}"` : '';
  const bgBlock = bgPrimary
    ? `<div class="img-wrapper cover-bg" data-path="/cover/backgroundImage" data-slot-hint="${covHint}"${bgDsl} data-alts="${bgDa}"><img src="${esc(bgPrimary)}" alt="${esc(cover.title || '')}" loading="eager" fetchpriority="high" decoding="async"></div>`
    : `<div class="img-wrapper cover-bg" data-path="/cover/backgroundImage" data-slot-hint="${covHint}"${bgDsl} data-alts="${bgDa}"><div class="cover-img-placeholder">${esc((cover.title || '路书').slice(0, 4))}</div></div>`;

  const { primary: logoPrimary, alts: logoAlts, slotLabel: logoSlot } = normalizeImageEntry(cover.logo);
  const logoBtn = altButtonHtml(logoAlts);
  const logoDa = esc(JSON.stringify(logoAlts));
  const logoHint = esc(compositeSlotHint('/cover/logo', logoSlot));
  const logoDsl = logoSlot ? ` data-slot-label="${esc(logoSlot)}"` : '';
  const logoHtml = logoPrimary
    ? `<div class="img-wrapper cover-logo-wrap" data-path="/cover/logo" data-slot-hint="${logoHint}"${logoDsl} data-alts="${logoDa}"><img class="cover-logo" src="${esc(logoPrimary)}" alt="Logo" loading="lazy" decoding="async">${logoBtn}</div>`
    : '';
  const coverMeta = tripData.meta?.title || cover.meta || '定制旅行路书';
  const rawSubtitle = String(cover.subtitle || '').trim();
  const subtitleHtml = shouldOmitCoverSubtitle(rawSubtitle)
    ? ''
    : `<p class="cover-subtitle" contenteditable="false" data-field="subtitle" data-component-id="cover" data-copy-md="1">${escMd(rawSubtitle)}</p>`;

  container.innerHTML = `
    <div class="cover-section">
      <div class="cover-left">
        ${bgBlock}
        <div class="bg-edit-ctrl-area"></div>
      </div>
      <div class="cover-right">
        <div class="cover-eyebrow">PRIVATE CUSTOM JOURNEY</div>
        ${logoHtml}
        <h1 class="cover-title" contenteditable="false" data-field="title" data-component-id="cover" data-copy-md="1">${escMd(cover.title || '旅行路书')}</h1>
        ${subtitleHtml}
        <div class="cover-meta-card" data-copy-md="1">${escMd(coverMeta)}</div>
      </div>
    </div>`;
}

/* ========== 组件分派 ========== */
function renderComponent(container, comp, idx, isFirstDaily) {
  const wrap = document.createElement('div');
  wrap.className = 'roadbook-component-wrapper';
  wrap.dataset.componentIndex = String(idx);
  container.appendChild(wrap);
  switch(comp.type) {
    case 'highlights': renderHighlights(wrap, comp, idx); break;
    case 'itinerary':  renderItinerary(wrap, comp, idx); break;
    case 'daily':      renderDaily(wrap, comp, idx, isFirstDaily); break;
    case 'feature':    renderFeature(wrap, comp, idx); break;
    case 'text-block': renderTextBlock(wrap, comp, idx); break;
  }
}

/* ========== 行程表 ========== */
function formatDayLabel(day) {
  if (day == null || day === '') return '';
  const s = String(day).trim();
  if (/^day\s*\d/i.test(s)) return s;
  return 'Day' + s;
}

function detectDayFromDate(dateText) {
  const s = String(dateText || '').trim();
  if (!s) return '';
  const m = s.match(/day\s*([0-9]+)/i);
  if (m) return `DAY ${m[1]}`;
  return '';
}

function stripDayPrefixFromDate(dateText) {
  const s = String(dateText || '').trim();
  if (!s) return '';
  return s.replace(/^day\s*[0-9]+\s*/i, '').trim();
}

function decideTopDisplayLimit(topEntries) {
  const count = Array.isArray(topEntries) ? topEntries.length : 0;
  if (count <= 0) return 0;
  /* 每日顶部默认展示 3 槽；大图仅在 sync 中用 cols-2-hero 微调列宽 */
  return Math.min(3, count);
}

function resolveDailyLayoutTemplate(dailyData, rightImageCount) {
  const allowed = new Set(['classic', 'focus', 'gallery', 'minimal']);
  const manual = String(dailyData?.layoutTemplate || '').trim().toLowerCase();
  if (allowed.has(manual)) return manual === 'gallery' ? 'classic' : manual;
  if (rightImageCount <= 0) return 'minimal';
  if (rightImageCount === 1) return 'focus';
  return 'classic';
}

            <td contenteditable="false" data-field="items/${ri}/transport" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(item.transport || '')}</td>

/* ========== 每日行程 ========== */

/** 每日右侧单槽：是否与旧逻辑一致视为「有数据」（含仅有对象占位） */
function dailyRightSlotHasRenderableContent(entry) {
  if (entry == null || entry === '') return false;
  if (primaryImageUrl(entry)) return true;
  if (typeof entry === 'object' && !Array.isArray(entry)) return true;
  if (Array.isArray(entry) && entry.length) return true;
  return false;
}

/**
 * 右侧图位：按数据从左到右裁剪，最少 2 格、最多 8 格（sideImage + bottomImages/0..6）。
 */
function buildDailyRightSlotsForLayout(d) {
  const bottomArr = Array.isArray(d.bottomImages) ? d.bottomImages : [];
  const slots = [];
  slots.push({
    entry: d.sideImage !== undefined && d.sideImage !== null ? d.sideImage : '',
    path: 'sideImage',
  });
  for (let i = 0; i < 7; i++) {
    const e = bottomArr[i];
    slots.push({
      entry: e !== undefined && e !== null ? e : '',
      path: `bottomImages/${i}`,
    });
  }
  let lastIdx = -1;
  slots.forEach((s, i) => {
    if (dailyRightSlotHasRenderableContent(s.entry)) lastIdx = i;
  });
  const renderCount = lastIdx < 0 ? 2 : Math.min(8, Math.max(2, lastIdx + 1));
  return slots.slice(0, renderCount);
}

function renderDaily(container, comp, idx, isFirstDaily) {
  const d = comp.data || {};

  const bundle = document.createElement('div');
  bundle.className = 'roadbook-component daily-component';
  bundle.setAttribute('data-component-type', 'daily');
  bundle.setAttribute('data-component-id', comp.id);

  // 仅第一个 daily 组件显示章节标题页（与后续每日页包在同一组件内，便于整段拖拽/删除）
  if (isFirstDaily) {
    const bgHtml = renderBgImageSlot(d.backgroundImage, 'backgroundImage');
    const dlNumHtml = d.sectionNum ? `<span class="section-num-deco">${esc(d.sectionNum)}</span>` : '';
    const dlKicker = renderComponentKicker('每日行程', 'DAILY ROUTE');
    const titlePage = document.createElement('section');
    titlePage.className = 'page-section chapter-title-page';
    titlePage.innerHTML = `
      ${bgHtml}
      <div class="page-overlay"></div>
      <div class="page-content" style="text-align:center;">
        ${dlNumHtml}
        ${dlKicker}
        <h2 class="section-big-title" contenteditable="false" data-field="title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.title || '详细行程')}</h2>
      </div>
      <div class="bg-edit-ctrl-area"></div>`;
    bundle.appendChild(titlePage);
  }

  // 内容页
  const page = document.createElement('div');
  page.className = 'daily-content-page';

  // 左列顶部图片：固定 3 槽（JSON 不足时补空对象，保证默认三列拼图位）
  const topImagesRaw = Array.isArray(d.topImages) ? d.topImages : [];
  const topCandidates = [0, 1, 2].map((i) => {
    const entry = topImagesRaw[i];
    if (entry != null && typeof entry === 'object' && !Array.isArray(entry)) return entry;
    return { alternates: [], slotLabel: '' };
  });

  const dayBadge = detectDayFromDate(d.date);
  const dateDisplay = dayBadge ? stripDayPrefixFromDate(d.date) : String(d.date || '').trim();
  const metaItems = [];
  if (d.transport) metaItems.push(`交通：${d.transport}`);
  if (d.accommodation) metaItems.push(`住宿：${d.accommodation}`);
  if (d.meals) metaItems.push(`餐食：${d.meals}`);
  if (d.distance) metaItems.push(`里程：${d.distance}`);
  const metaHtml = metaItems.length
    ? `<div class="daily-meta">${metaItems.map((m) => `<span class="daily-meta-item">${escMd(m)}</span>`).join('')}</div>`
    : '';

  // 标题栏
  const titleBar = `<div class="daily-title-bar">
      <div class="daily-label">Private Day Plan</div>
      <div class="daily-head">
        ${dayBadge ? `<span class="daily-day-badge">${esc(dayBadge)}</span>` : ''}
      ${dateDisplay ? `<span class="daily-date">${escMd(dateDisplay)}</span>` : ''}
      <span class="daily-theme" contenteditable="false" data-field="theme" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.theme || '')}</span>
      </div>
      ${metaHtml}
    </div>`;

  // 速览区（仅当 overview 字段存在时渲染）
  const overviewHtml = (d.overview != null)
    ? `<div class="daily-overview-wrap">
        <div class="daily-overview-label">速览</div>
        <div class="daily-overview-text" contenteditable="false" data-field="overview" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.overview || '')}</div>
      </div>`
    : '';

  // 文字区
  const textHtml = `<div class="daily-text" contenteditable="false" data-field="description" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.description || '')}</div>`;

  // 右列图片：最少 2 格、最多 8 格，按 sideImage + bottomImages 顺序随内容延伸
  const rightImagesForLayout = buildDailyRightSlotsForLayout(d);
  const rightActual = rightImagesForLayout.length;

  page.classList.add('daily-layout-classic');

  const topDisplayLimit = decideTopDisplayLimit(topCandidates);
  const topImagesForLayout = topCandidates.slice(0, topDisplayLimit || 3);
  const topCountForLayout = Math.min(topImagesForLayout.length, 3);
  let topGridClassForLayout = 'cols-1';
  if (topCountForLayout === 2) topGridClassForLayout = 'cols-2';
  else if (topCountForLayout >= 3) topGridClassForLayout = 'cols-3';

  const topImgHtmlForLayout = `<div class="daily-top-images ${topGridClassForLayout}">${topImagesForLayout.map((img, i) =>
        renderImage(img, '', `topImages/${i}`, '')
      ).join('')}</div>`;

  const rightGalleryClass = `daily-right-gallery daily-right-gallery--${rightActual}`;

  const rightHtml = `<div class="daily-right-column ${rightGalleryClass} layout-classic">${rightImagesForLayout.map((r) =>
        renderImage(r.entry, '', r.path, '')
      ).join('')}</div>`;

  // 组装页面（顶部图片与添加按钮同属 .daily-top-zone，便于悬浮定位）
  const leftColumn = `<div class="daily-left-column">
    <div class="daily-top-zone">
      ${topImgHtmlForLayout}
      <button type="button" class="daily-zone-add" data-zone="top">+ 添加上方图片</button>
    </div>
    ${titleBar}
    ${overviewHtml}
    ${textHtml}
  </div>`;

  const rightZone = rightHtml;
  page.innerHTML = leftColumn + rightZone;
  /* 编辑态顶部最多保留 3 张，与 decideTopDisplayLimit 的「初排展示」解耦 */
  page.dataset.topMax = '3';
  page.dataset.rightMax = '8';
  const rightCol = page.querySelector('.daily-right-column');
  if (rightCol) {
    rightCol.insertAdjacentHTML('beforeend', '<button type="button" class="daily-zone-add" data-zone="right">+ 添加右侧图片</button>');
  }
  bundle.appendChild(page);
  decorateDailyImageSlots(bundle);
  syncDailyZoneClasses(bundle);
  autoAdjustTopByNaturalSize(bundle);
  container.appendChild(bundle);
}

function dailyWrapperActionsHtml() {
  return `<div class="daily-img-actions">
    <button type="button" class="daily-img-btn daily-drag-handle" draggable="true" title="拖动排序">⇅</button>
    <button type="button" class="daily-img-btn daily-del" title="删除图片">×</button>
  </div>`;
}

function decorateDailyImageSlots(bundle) {
  if (!bundle) return;
  const topWraps = Array.from(bundle.querySelectorAll('.daily-top-images .img-wrapper'));
  topWraps.forEach((wrap) => {
    wrap.dataset.dailyZone = 'top';
    let actions = wrap.querySelector('.daily-img-actions');
    if (!actions) {
      wrap.insertAdjacentHTML('beforeend', dailyWrapperActionsHtml());
    } else if (!actions.querySelector('.daily-drag-handle')) {
      actions.insertAdjacentHTML('afterbegin', '<button type="button" class="daily-img-btn daily-drag-handle" draggable="true" title="拖动排序">⇅</button>');
    }
    wrap.querySelectorAll('img').forEach((img) => { img.draggable = false; });
  });

  const rightWraps = Array.from(bundle.querySelectorAll('.daily-right-column .img-wrapper'));
  rightWraps.forEach((wrap) => {
    wrap.dataset.dailyZone = 'right';
    let actions = wrap.querySelector('.daily-img-actions');
    if (!actions) {
      wrap.insertAdjacentHTML('beforeend', dailyWrapperActionsHtml());
    } else if (!actions.querySelector('.daily-drag-handle')) {
      actions.insertAdjacentHTML('afterbegin', '<button type="button" class="daily-img-btn daily-drag-handle" draggable="true" title="拖动排序">⇅</button>');
    }
    wrap.querySelectorAll('img').forEach((img) => { img.draggable = false; });
  });

  const topZonePool = bundle.querySelector('.daily-top-images');
  if (topZonePool) {
    topZonePool.querySelectorAll(':scope > .img-wrapper').forEach((w) => {
      syncEmptySlotAltsFromSiblings(w);
    });
  }
  const rightColPool = bundle.querySelector('.daily-right-column');
  if (rightColPool) {
    rightColPool.querySelectorAll(':scope > .img-wrapper').forEach((w) => {
      syncEmptySlotAltsFromSiblings(w);
    });
  }
  refreshDailyDragUi(bundle);
}

/** 仅多图时显示排序手柄，避免单图界面杂乱 */
function refreshDailyDragUi(bundle) {
  if (!bundle) return;
  const topZone = bundle.querySelector('.daily-top-images');
  const topWraps = topZone ? Array.from(topZone.querySelectorAll(':scope > .img-wrapper')) : [];
  topWraps.forEach((w) => {
    const h = w.querySelector('.daily-drag-handle');
    if (h) h.style.display = topWraps.length >= 2 ? '' : 'none';
  });
  const rightCol = bundle.querySelector('.daily-right-column');
  const rightWraps = rightCol ? Array.from(rightCol.querySelectorAll(':scope > .img-wrapper')) : [];
  rightWraps.forEach((w) => {
    const h = w.querySelector('.daily-drag-handle');
    if (h) h.style.display = rightWraps.length >= 2 ? '' : 'none';
  });
}

function syncDailyZoneClasses(bundle) {
  if (!bundle) return;
  const page = bundle.querySelector('.daily-content-page');
  if (!page) return;

  const topZone = page.querySelector('.daily-top-images');
  const topCount = topZone ? topZone.querySelectorAll('.img-wrapper').length : 0;
  const topMax = Math.max(1, Number(page.dataset.topMax || 3));
  if (topZone) {
    const heroMode = String(page.dataset.topHero || '') === '1';
    topZone.classList.remove('cols-1', 'cols-2', 'cols-2-hero', 'cols-3');
    if (topCount >= 3) topZone.classList.add('cols-3');
    else if (topCount === 2) topZone.classList.add(heroMode ? 'cols-2-hero' : 'cols-2');
    else topZone.classList.add('cols-1');
  }
  const addTop = page.querySelector('.daily-zone-add[data-zone="top"]');
  if (addTop) addTop.style.display = topCount >= topMax ? 'none' : '';

  const rightCol = page.querySelector('.daily-right-column');
  if (rightCol) {
    const rightCount = rightCol.querySelectorAll('.img-wrapper').length;
    const rightMax = Math.max(1, Math.min(8, Number(page.dataset.rightMax || 8)));
    rightCol.classList.remove('right-count-1', 'right-count-2');
    for (let n = 1; n <= 8; n++) rightCol.classList.remove(`daily-right-gallery--${n}`);
    rightCol.classList.add('daily-right-gallery');
    if (rightCount >= 1) rightCol.classList.add(`daily-right-gallery--${Math.min(rightCount, 8)}`);

    if (rightCount === 0) page.classList.add('no-right-column');
    else page.classList.remove('no-right-column');

    const addRight = page.querySelector('.daily-zone-add[data-zone="right"]');
    if (addRight) addRight.style.display = rightCount >= rightMax ? 'none' : '';
  }

  refreshDailyDragUi(bundle);
}

function reindexDailyImagePaths(bundle) {
  if (!bundle) return;
  const topWraps = Array.from(bundle.querySelectorAll('.daily-top-images .img-wrapper'));
  topWraps.forEach((wrap, idx) => {
    wrap.dataset.path = `topImages/${idx}`;
    refreshSlotHint(wrap);
  });

  const rightWraps = Array.from(bundle.querySelectorAll('.daily-right-column .img-wrapper'));
  rightWraps.forEach((wrap, idx) => {
    wrap.dataset.path = idx === 0 ? 'sideImage' : `bottomImages/${idx - 1}`;
    refreshSlotHint(wrap);
  });

  decorateDailyImageSlots(bundle);
  syncDailyZoneClasses(bundle);
  if (isEditing) ensureImgEditOverlays(bundle);
}

function autoAdjustTopByNaturalSize(bundle) {
  if (!bundle) return;
  const page = bundle.querySelector('.daily-content-page');
  const topZone = bundle.querySelector('.daily-top-images');
  if (!page || !topZone) return;

  const wraps = Array.from(topZone.querySelectorAll('.img-wrapper'));
  if (wraps.length < 3) return;

  const imgs = wraps.map(w => w.querySelector('img')).filter(Boolean);
  if (!imgs.length) return;

  let checked = 0;
  let hasLarge = false;
  const done = () => {
    checked += 1;
    if (checked < imgs.length) return;
    page.dataset.topHero = hasLarge ? '1' : '0';
    reindexDailyImagePaths(bundle);
  };

  imgs.forEach((img) => {
    const inspect = () => {
      const w = Number(img.naturalWidth || 0);
      const h = Number(img.naturalHeight || 0);
      if (w > 0 && h > 0) {
        const ratio = w / h;
        if (ratio >= 1.85 || ratio <= 0.62 || w >= 2600 || h >= 2600) {
          hasLarge = true;
        }
      }
      done();
    };
    if (img.complete) inspect();
    else {
      img.addEventListener('load', inspect, { once: true });
      img.addEventListener('error', done, { once: true });
    }
  });
}

const STAY_GALLERY_MAX = 8;

function syncStayGalleryLayoutClass(gallery) {
  if (!gallery) return;
  const n = gallery.querySelectorAll(':scope > .img-wrapper').length;
  for (let i = 1; i <= STAY_GALLERY_MAX; i++) gallery.classList.remove(`feature-hotel-gallery--${i}`);
  const mod = n === 0 ? 1 : Math.min(n, STAY_GALLERY_MAX);
  gallery.classList.add(`feature-hotel-gallery--${mod}`);
}

function decorateStayGallerySlots(gallery) {
  if (!gallery) return;
  const wraps = gallery.querySelectorAll(':scope > .img-wrapper');
  wraps.forEach((wrap) => {
    wrap.dataset.stayGalleryDnd = '1';
    let actions = wrap.querySelector('.daily-img-actions');
    if (!actions) {
      wrap.insertAdjacentHTML('beforeend', dailyWrapperActionsHtml());
    } else if (!actions.querySelector('.daily-drag-handle')) {
      actions.insertAdjacentHTML('afterbegin', '<button type="button" class="daily-img-btn daily-drag-handle" draggable="true" title="拖动排序">⇅</button>');
    }
    wrap.querySelectorAll('img').forEach((img) => { img.draggable = false; });
  });
  gallery.querySelectorAll(':scope > .img-wrapper').forEach((w) => {
    syncEmptySlotAltsFromSiblings(w);
  });
  const visual = gallery.closest('.feature-hotel-sheet-visual');
  const addBtn = visual && visual.querySelector('.daily-zone-add[data-zone="stay-gallery"]');
  const cnt = gallery.querySelectorAll(':scope > .img-wrapper').length;
  if (addBtn) addBtn.style.display = cnt >= STAY_GALLERY_MAX ? 'none' : '';
  wraps.forEach((w) => {
    const h = w.querySelector('.daily-drag-handle');
    if (h) h.style.display = cnt >= 2 ? '' : 'none';
  });
  // 住宿 / 交通（用车保障）共用右侧图库：动态插入的图片槽须有换图蒙层（仅编辑态）
  if (isEditing) ensureImgEditOverlays(gallery);
}

function reindexStayGalleryItems(gallery, itemIndex) {
  if (!gallery) return;
  const wraps = Array.from(gallery.querySelectorAll(':scope > .img-wrapper'));
  wraps.forEach((wrap, idx) => {
    wrap.dataset.path = `items/${itemIndex}/images/${idx}`;
    refreshSlotHint(wrap);
  });
  syncStayGalleryLayoutClass(gallery);
  decorateStayGallerySlots(gallery);
}

/** 酒店卡右侧（住宿 / 交通）：插入「添加图片」、编排槽位与版式 class（与每日右栏一致，最多 8 张） */
function initFeatureStayGalleries(featureSection) {
  if (!featureSection || featureSection.dataset.componentType !== 'feature') return;
  if (!featureSection.classList.contains('feature-hotel-sheet-section')) return;
  const cards = featureSection.querySelectorAll('.feature-hotel-sheet');
  cards.forEach((card, itemIndex) => {
    const visual = card.querySelector('.feature-hotel-sheet-visual');
    const gallery = visual && visual.querySelector('.feature-hotel-gallery');
    if (!visual || !gallery) return;
    if (!visual.querySelector('.daily-zone-add[data-zone="stay-gallery"]')) {
      visual.insertAdjacentHTML('beforeend', '<button type="button" class="daily-zone-add" data-zone="stay-gallery">+ 添加右侧图片</button>');
    }
    reindexStayGalleryItems(gallery, itemIndex);
  });
}

/** 住宿图库：最多 8 张，顺序与 items[i].images 一致；版式与每日行程右侧图库一致（--1 … --8） */
function buildStayHotelGallery(imageEntries, title, itemIndex) {
  const n = imageEntries.length;
  const layoutMod = n === 0 ? 1 : Math.min(n, STAY_GALLERY_MAX);
  const cells = n === 0
    ? [renderImage('', title || '', `items/${itemIndex}/images/0`, 'feature-hotel-gcell')]
    : imageEntries.slice(0, STAY_GALLERY_MAX).map((entry, idx) =>
        renderImage(entry, title || '', `items/${itemIndex}/images/${idx}`, 'feature-hotel-gcell')
      );
  return `<div class="feature-hotel-gallery feature-hotel-gallery--${layoutMod}">${cells.join('')}</div>`;
}

/* ========== 特点介绍 ========== */
function renderFeature(container, comp, idx) {
  const d = comp.data || {};
  const bgHtml = renderBgImageSlot(d.backgroundImage, 'backgroundImage');
  const subtypeMeta = getSubtypeMeta(d.subtype || '其他');

  const useHotelSheetLayout =
    subtypeMeta.className === 'stay' || subtypeMeta.className === 'transport';
  const section = document.createElement('div');
  section.className =
    `roadbook-component feature-section feature-${subtypeMeta.className}` +
    (useHotelSheetLayout ? ' feature-hotel-sheet-section' : '');
  section.setAttribute('data-component-type', 'feature');
  section.setAttribute('data-component-id', comp.id);

  // 头部
  const ftNumHtml = d.sectionNum ? `<span class="section-num-deco">${esc(d.sectionNum)}</span>` : '';
  const ftKicker = renderComponentKicker(subtypeMeta.label, subtypeMeta.eyebrow);
  const header = `
    <div class="feature-header">
      ${bgHtml}
      <div class="page-overlay"></div>
      <div class="page-content" style="text-align:center;position:relative;z-index:2;">
        ${ftNumHtml}
        ${ftKicker}
        <h2 class="section-big-title" contenteditable="false" data-field="title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.title || '特点介绍')}</h2>
      </div>
      <div class="bg-edit-ctrl-area"></div>
    </div>`;

  // 卡片内容（住宿、交通：酒店卡左文右图，最多 8 张）
  const items = Array.isArray(d.items) ? d.items : [];
  const cardsHtml = items.map((item, i) => {
    const rawImages = Array.isArray(item.images) ? item.images : [];
    const filtered = rawImages.filter(
      entry => primaryImageUrl(entry) || (entry && typeof entry === 'object')
    );
    const imageEntries = useHotelSheetLayout
      ? filtered.slice(0, STAY_GALLERY_MAX)
      : filtered.slice(0, 3);
    const imgCountClass = `img-count-${Math.min(imageEntries.length, 3)}`;
    const textLen = String(item.description || '').replace(/\s+/g, '').length;
    const balanceClass = useHotelSheetLayout
      ? ''
      : (textLen <= 55 ? 'balance-short' : (textLen >= 150 ? 'balance-long' : ''));
    const bodyClass = imageEntries.length > 0
      ? `feature-card-body ${useHotelSheetLayout ? 'feature-card-body-stay' : balanceClass}`.trim()
      : `feature-card-body no-images${useHotelSheetLayout ? ' feature-card-body-stay' : ''}`.trim();
    const mediaClass = useHotelSheetLayout
      ? 'media-stay'
      : (textLen <= 55 ? 'media-compact' : (textLen >= 150 ? 'media-relaxed' : ''));
    if (useHotelSheetLayout) {
      const galleryHtml = buildStayHotelGallery(imageEntries, item.title || '', i);
      return `
      <div class="feature-card feature-hotel-sheet">
        <div class="feature-hotel-sheet-head">
          <span class="feature-hotel-sheet-kicker">${escMd(subtypeMeta.label)}</span>
          <div class="feature-hotel-sheet-title" contenteditable="false" data-field="items/${i}/title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(item.title || '')}</div>
        </div>
        <div class="feature-hotel-sheet-rule"></div>
        <div class="feature-hotel-sheet-body">
          <div class="feature-hotel-sheet-copy">
            <div class="feature-hotel-intro-row"><span class="feature-hotel-intro-label">简介</span></div>
            <div class="feature-hotel-sheet-desc" contenteditable="false" data-field="items/${i}/description" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(item.description || '')}</div>
          </div>
          <div class="feature-hotel-sheet-visual">
            ${galleryHtml}
          </div>
        </div>
      </div>`;
    }
    const imagesHtml = imageEntries.length > 0
      ? `<div class="feature-card-images ${imgCountClass} ${mediaClass}">${imageEntries.map((entry, imgIdx) =>
          renderImage(entry, item.title || '', `items/${i}/images/${imgIdx}`, '')
        ).join('')}</div>`
      : '';
    return `
      <div class="feature-card">
        <div class="feature-card-title-wrap">
          <span class="feature-type-pill">${escMd(subtypeMeta.eyebrow)}</span>
          <div class="feature-card-title" contenteditable="false" data-field="items/${i}/title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(item.title || '')}</div>
        </div>
        <div class="${bodyClass}">
          <div class="feature-card-text" contenteditable="false" data-field="items/${i}/description" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(item.description || '')}</div>
          ${imagesHtml}
        </div>
      </div>`;
  }).join('');

  section.innerHTML = `${header}<div class="feature-cards${useHotelSheetLayout ? ' feature-cards-stay' : ''}">${cardsHtml}</div>`;
  container.appendChild(section);
  if (useHotelSheetLayout) initFeatureStayGalleries(section);
}

/* ========== 文字说明 ========== */
function renderTextBlock(container, comp, idx) {
  const d = comp.data || {};
  const subtypeMeta = getSubtypeMeta(d.subtype || '其他');
  const sub = d.subtype || '';
  const mergedRich = isTextblockMergedRichSubtype(sub);
  const bgHtml = mergedRich ? '' : renderBgImageSlot(d.backgroundImage, 'backgroundImage');

  let bodyInner = '';
  let emptyHint = '';

  if (mergedRich) {
    const mergedRaw = buildSimpleRichEditorInnerHtml(d);
    const mergedSafe = mergedRaw ? sanitizeRoadbookRichHtml(mergedRaw) : '';
    const editorInner = mergedSafe || '<p></p>';
    bodyInner = `<div class="textblock-rich textblock-content textblock-rich-editor" contenteditable="false" data-field="content" data-rich="1" data-component-id="${esc(comp.id)}">${editorInner}</div>`;
    emptyHint = '';
  } else {
    const sections = Array.isArray(d.sections) ? d.sections : [];
    const sectionsHtml = sections.length ? `
    <div class="textblock-sections">
      ${sections.map((sec, i) => `
    <div class="textblock-section-item">
      <h3 contenteditable="false" data-field="sections/${i}/heading" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(sec.heading || '')}</h3>
      <div class="tb-body" contenteditable="false" data-field="sections/${i}/body" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(sec.body || '')}</div>
    </div>`).join('')}
    </div>
  ` : '';
    const contentHtml = d.content
      ? `<div class="textblock-content" contenteditable="false" data-field="content" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.content)}</div>`
      : '';
    bodyInner = `${contentHtml}${sectionsHtml}`;
    emptyHint = (!contentHtml && !sectionsHtml)
      ? `<div class="textblock-empty">请人工填写费用、规则或出行说明内容</div>`
      : '';
  }

  const section = document.createElement('section');
  section.setAttribute('data-component-type', 'text-block');
  section.setAttribute('data-component-id', comp.id);

  if (mergedRich) {
    const tbTitle =
      sub === '须知'
        ? subtypeMeta.label
        : (d.title && String(d.title).trim()) || subtypeMeta.label || '标题';
    section.className = `textblock-section textblock-simple-rich roadbook-component textblock-${subtypeMeta.className}`;
    section.setAttribute('data-textblock-mode', 'simple-rich');
    section.innerHTML = `
    <div class="textblock-card">
      <h2 class="textblock-title" contenteditable="false" data-field="title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(tbTitle)}</h2>
      <div class="textblock-body-panel">
        <div class="textblock-body-content">
          ${bodyInner}
          ${emptyHint}
        </div>
      </div>
    </div>`;
  } else {
    section.className = `textblock-section page-section-with-bg roadbook-component textblock-${subtypeMeta.className}`;
    section.innerHTML = `
    ${bgHtml}
    <div class="page-overlay" style="background:linear-gradient(180deg,rgba(26,35,50,0.08) 0%,rgba(26,35,50,0.22) 100%);"></div>
    <div class="textblock-card">
      <h2 class="textblock-title" contenteditable="false" data-field="title" data-component-id="${esc(comp.id)}" data-copy-md="1">${escMd(d.title || '标题')}</h2>
      <div class="textblock-body-panel">
        <div class="textblock-body-content">
          ${bodyInner}
          ${emptyHint}
        </div>
      </div>
    </div>
    <div class="bg-edit-ctrl-area"></div>`;
  }

  container.appendChild(section);
}

document.addEventListener('DOMContentLoaded', function() {
