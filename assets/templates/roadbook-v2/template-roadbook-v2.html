// ===== 编辑模式 =====
let isEditing = false;
let dailyDndSrc = null;
let stayGalleryDndSrc = null;

function dailyInsertDraggedRelative(container, dragged, target, clientX, clientY) {
  if (!container || !dragged || !target || dragged === target) return;
  const sibs = Array.from(container.children).filter((el) => el.classList && el.classList.contains('img-wrapper'));
  if (!sibs.includes(dragged) || !sibs.includes(target)) return;

  const r = target.getBoundingClientRect();
  const horiz = r.width >= r.height;
  const before = horiz ? clientX < r.left + r.width / 2 : clientY < r.top + r.height / 2;

  const others = sibs.filter((n) => n !== dragged);
  let destIndex = others.indexOf(target) + (before ? 0 : 1);
  if (destIndex < 0) destIndex = 0;
  if (destIndex > others.length) destIndex = others.length;

  const ref = others[destIndex];
  if (ref) {
    container.insertBefore(dragged, ref);
  } else {
    const addBtn = container.querySelector(':scope > .daily-zone-add');
    container.insertBefore(dragged, addBtn || null);
  }
}

document.addEventListener('dragstart', function(e) {
  if (!isEditing) return;
  const handle = e.target.closest('.daily-drag-handle');
  if (!handle) return;
  const wrap = handle.closest('.img-wrapper');
  if (wrap && wrap.dataset.stayGalleryDnd === '1') {
    stayGalleryDndSrc = wrap;
    wrap.classList.add('daily-dnd-source');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', 'stay-gallery');
    try {
      e.dataTransfer.setDragImage(wrap, Math.min(48, wrap.offsetWidth / 2), Math.min(36, wrap.offsetHeight / 2));
    } catch (err) { /* ignore */ }
    e.stopPropagation();
    return;
  }
  if (!wrap || !wrap.dataset.dailyZone) return;
  dailyDndSrc = wrap;
  wrap.classList.add('daily-dnd-source');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', wrap.dataset.dailyZone);
  try {
    e.dataTransfer.setDragImage(wrap, Math.min(48, wrap.offsetWidth / 2), Math.min(36, wrap.offsetHeight / 2));
  } catch (err) { /* ignore */ }
  e.stopPropagation();
});

document.addEventListener('dragover', function(e) {
  if (stayGalleryDndSrc && isEditing) {
    if (e.target.closest('.daily-zone-add, .daily-img-actions')) return;
    const wrap = e.target.closest('.feature-hotel-gallery .img-wrapper');
    if (!wrap || wrap === stayGalleryDndSrc) return;
    if (wrap.closest('.feature-hotel-gallery') !== stayGalleryDndSrc.closest('.feature-hotel-gallery')) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.img-wrapper.daily-dnd-over').forEach((el) => el.classList.remove('daily-dnd-over'));
    wrap.classList.add('daily-dnd-over');
    return;
  }
  if (!dailyDndSrc || !isEditing) return;
  if (e.target.closest('.daily-zone-add, .daily-img-actions')) return;
  const wrap = e.target.closest('.daily-top-images .img-wrapper, .daily-right-column .img-wrapper');
  if (!wrap || wrap === dailyDndSrc) return;
  if (wrap.dataset.dailyZone !== dailyDndSrc.dataset.dailyZone) return;
  const topHost = dailyDndSrc.closest('.daily-top-images');
  const rightHost = dailyDndSrc.closest('.daily-right-column');
  if (topHost && wrap.closest('.daily-top-images') !== topHost) return;
  if (rightHost && wrap.closest('.daily-right-column') !== rightHost) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.img-wrapper.daily-dnd-over').forEach((el) => el.classList.remove('daily-dnd-over'));
  wrap.classList.add('daily-dnd-over');
});

document.addEventListener('drop', function(e) {
  if (stayGalleryDndSrc && isEditing) {
    const wrap = e.target.closest('.feature-hotel-gallery .img-wrapper');
    if (!wrap || wrap.dataset.stayGalleryDnd !== '1') return;
    if (wrap.closest('.feature-hotel-gallery') !== stayGalleryDndSrc.closest('.feature-hotel-gallery')) return;
    e.preventDefault();
    const container = stayGalleryDndSrc.parentElement;
    if (!container || container !== wrap.parentElement) return;
    dailyInsertDraggedRelative(container, stayGalleryDndSrc, wrap, e.clientX, e.clientY);
    e.stopPropagation();
    const gallery = stayGalleryDndSrc.closest('.feature-hotel-gallery');
    const featureSec = gallery.closest('.roadbook-component[data-component-type="feature"]');
    const card = gallery.closest('.feature-hotel-sheet');
    const itemIndex = Array.from(featureSec.querySelectorAll('.feature-hotel-sheet')).indexOf(card);
    reindexStayGalleryItems(gallery, itemIndex);
    return;
  }
  if (!dailyDndSrc || !isEditing) return;
  const wrap = e.target.closest('.daily-top-images .img-wrapper, .daily-right-column .img-wrapper');
  if (!wrap || wrap.dataset.dailyZone !== dailyDndSrc.dataset.dailyZone) return;
  e.preventDefault();
  const container = dailyDndSrc.parentElement;
  if (!container || container !== wrap.parentElement) return;
  dailyInsertDraggedRelative(container, dailyDndSrc, wrap, e.clientX, e.clientY);
  e.stopPropagation();
  const bundle = dailyDndSrc.closest('.roadbook-component.daily-component');
  reindexDailyImagePaths(bundle);
});

document.addEventListener('dragend', function() {
  if (stayGalleryDndSrc) {
    stayGalleryDndSrc.classList.remove('daily-dnd-source');
    stayGalleryDndSrc = null;
  }
  if (dailyDndSrc) {
    dailyDndSrc.classList.remove('daily-dnd-source');
    dailyDndSrc = null;
  }
  document.querySelectorAll('.img-wrapper.daily-dnd-over').forEach((el) => el.classList.remove('daily-dnd-over'));
});

document.addEventListener('click', function(e) {
  if (!isEditing) return;
  const altBtn = e.target.closest('.img-alt-btn');
  if (!altBtn) return;
  e.stopPropagation();
  e.preventDefault();
  let alts = [];
  try {
    alts = JSON.parse(altBtn.dataset.alts || '[]');
  } catch (err) { alts = []; }
  const wrapper = altBtn.closest('.img-wrapper');
  const targetImg = wrapper && (wrapper.querySelector('img.page-bg') || wrapper.querySelector('img.cover-logo') || wrapper.querySelector('img'));
  showAltPanel(targetImg, alts.length ? alts : [], altBtn);
});

document.addEventListener('click', function(e) {
  if (!isEditing) return;

  const addBtn = e.target.closest('.highlights-item-add');
  if (addBtn) {
    const section = addBtn.closest('.roadbook-component[data-component-type="highlights"]');
    if (!section) return;
    const list = section.querySelector('.highlights-items');
    if (!list) return;
    const li = document.createElement('li');
    li.innerHTML = `<span class="highlights-item-text" contenteditable="true">请填写亮点内容</span><button type="button" class="hl-item-del" title="删除此条">×</button>`;
    list.appendChild(li);
    reindexHighlightItems(section);
    const textEl = li.querySelector('.highlights-item-text');
    if (textEl) {
      textEl.focus();
      document.execCommand && document.execCommand('selectAll', false, null);
    }
    e.preventDefault();
    e.stopPropagation();
    return;
  }

  const delBtn = e.target.closest('.hl-item-del');
  if (delBtn) {
    const li = delBtn.closest('li');
    const section = delBtn.closest('.roadbook-component[data-component-type="highlights"]');
    if (li && section) {
      const list = section.querySelector('.highlights-items');
      if (list && list.children.length > 1) {
        li.remove();
      } else if (li) {
        const textEl = li.querySelector('.highlights-item-text');
        if (textEl) textEl.textContent = '';
      }
      reindexHighlightItems(section);
    }
    e.preventDefault();
    e.stopPropagation();
  }
});

document.addEventListener('click', function(e) {
  if (!isEditing) return;

  const addBtn = e.target.closest('.daily-zone-add');
  if (addBtn) {
    const zone = addBtn.dataset.zone;
    if (zone === 'stay-gallery') {
      const visual = addBtn.closest('.feature-hotel-sheet-visual');
      const featureSec = addBtn.closest('.roadbook-component[data-component-type="feature"]');
      const gallery = visual && visual.querySelector('.feature-hotel-gallery');
      const card = visual && visual.closest('.feature-hotel-sheet');
      if (!gallery || !featureSec || !card) return;
      const itemIndex = Array.from(featureSec.querySelectorAll('.feature-hotel-sheet')).indexOf(card);
      const count = gallery.querySelectorAll(':scope > .img-wrapper').length;
      if (count >= STAY_GALLERY_MAX) return;
      gallery.insertAdjacentHTML('afterbegin', renderImage('', '', `items/${itemIndex}/images/${count}`, 'feature-hotel-gcell'));
      reindexStayGalleryItems(gallery, itemIndex);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    const bundle = addBtn.closest('.roadbook-component.daily-component');
    if (!bundle) return;

    if (zone === 'top') {
      let topZone = bundle.querySelector('.daily-top-images');
      if (!topZone) {
        topZone = document.createElement('div');
        topZone.className = 'daily-top-images cols-1';
        addBtn.parentElement.insertBefore(topZone, addBtn);
      }
      const count = topZone.querySelectorAll('.img-wrapper').length;
      const page = bundle.querySelector('.daily-content-page');
      const topMax = Math.max(1, Number((page && page.dataset.topMax) || 3));
      if (count >= topMax) return;
      topZone.insertAdjacentHTML('beforeend', renderImage('', '', `topImages/${count}`, ''));
    } else if (zone === 'right') {
      const rightCol = bundle.querySelector('.daily-right-column');
      if (!rightCol) return;
      const page = bundle.querySelector('.daily-content-page');
      const rightMax = Math.max(1, Math.min(8, Number((page && page.dataset.rightMax) || 8)));
      const count = rightCol.querySelectorAll('.img-wrapper').length;
      if (count >= rightMax) return;
      const path = count === 0 ? 'sideImage' : `bottomImages/${count - 1}`;
      rightCol.insertAdjacentHTML('afterbegin', renderImage('', '', path, ''));
    }

    reindexDailyImagePaths(bundle);
    e.preventDefault();
    e.stopPropagation();
    return;
  }

  const delBtn = e.target.closest('.daily-img-btn.daily-del');
  if (delBtn) {
    const wrap = delBtn.closest('.img-wrapper');
    if (wrap && wrap.dataset.stayGalleryDnd === '1') {
      const gallery = wrap.closest('.feature-hotel-gallery');
      const featureSec = wrap.closest('.roadbook-component[data-component-type="feature"]');
      const card = wrap.closest('.feature-hotel-sheet');
      if (!gallery || !featureSec || !card) return;
      const itemIndex = Array.from(featureSec.querySelectorAll('.feature-hotel-sheet')).indexOf(card);
      const count = gallery.querySelectorAll(':scope > .img-wrapper').length;
      if (count > 1) wrap.remove();
      else {
        const img = wrap.querySelector('img');
        if (img) img.remove();
        wrap.dataset.alts = '[]';
      }
      reindexStayGalleryItems(gallery, itemIndex);
      e.preventDefault();
      e.stopPropagation();
      return;
    }
    const bundle = delBtn.closest('.roadbook-component.daily-component');
    if (!wrap || !bundle) return;

    const zone = wrap.dataset.dailyZone;
    if (zone === 'top') {
      const topZone = bundle.querySelector('.daily-top-images');
      const count = topZone ? topZone.querySelectorAll('.img-wrapper').length : 0;
      if (count > 1) wrap.remove();
      else {
        const img = wrap.querySelector('img');
        if (img) img.remove();
        wrap.dataset.alts = '[]';
      }
    } else {
      const rightCol = bundle.querySelector('.daily-right-column');
      const count = rightCol ? rightCol.querySelectorAll('.img-wrapper').length : 0;
      if (count > 1) wrap.remove();
      else {
        const img = wrap.querySelector('img');
        if (img) img.remove();
        wrap.dataset.alts = '[]';
      }
    }

    reindexDailyImagePaths(bundle);
    e.preventDefault();
    e.stopPropagation();
  }
});

function exitEditMode() {
  if (!isEditing) return;
  isEditing = false;
  document.body.classList.remove('editing');
  const btn = document.querySelector('.btn-edit');
  if (btn) {
    btn.textContent = '编辑';
    btn.classList.remove('active');
  }
  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.contentEditable = 'false';
  });
  dailyDndSrc = null;
  document.querySelectorAll('.img-wrapper.daily-dnd-source, .img-wrapper.daily-dnd-over').forEach((el) => {
    el.classList.remove('daily-dnd-source', 'daily-dnd-over');
  });
}

function toggleEdit() {
  if (isEditing) {
    exitEditMode();
    return;
  }
  isEditing = true;
  document.body.classList.add('editing');
  const btn = document.querySelector('.btn-edit');
  btn.textContent = '退出编辑';
  btn.classList.add('active');
  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.contentEditable = 'true';
  });
  initEditUI();
}

function getWrapperAlts(wrapper) {
  if (!wrapper) return [];
  try {
    return uniqueUrls(JSON.parse(wrapper.dataset.alts || '[]'));
  } catch (e) {
    return [];
  }
}

/** 从 `.bg-edit-ctrl-area` 上溯到标题区内的 `.page-bg-wrap` 或封面背景；费用/服务说明页无此控件。 */
function findBgWrapForCtrl(ctrl) {
  const parent = ctrl && ctrl.parentElement;
  if (!parent) return null;
  return parent.querySelector(':scope > .page-bg-wrap')
    || parent.querySelector(':scope > .img-wrapper[data-path="/cover/backgroundImage"]')
    || parent.querySelector('.page-bg-wrap')
    || parent.querySelector('.img-wrapper[data-path="/cover/backgroundImage"]');
}

function refreshBgCtrlForWrapper(wrapper) {
  const isTitleBg = wrapper && (
    wrapper.classList.contains('page-bg-wrap') ||
    wrapper.dataset.path === '/cover/backgroundImage'
  );
  if (!isTitleBg) return;
  const parent = wrapper.parentElement;
  if (!parent) return;
  const ctrl = parent.querySelector(':scope > .bg-edit-ctrl-area') || parent.querySelector('.bg-edit-ctrl-area');
  if (ctrl) updateBgCtrlArea(ctrl, wrapper);
}

function updateBgCtrlArea(ctrl, bgWrap) {
  ctrl.innerHTML = '';
  if (!bgWrap) return;

  const replBtn = document.createElement('button');
  replBtn.type = 'button';
  replBtn.className = 'bg-edit-btn';
  replBtn.textContent = '🖼 替换背景';
  replBtn.addEventListener('click', (e) => { e.stopPropagation(); openImageModal(bgWrap); });
  ctrl.appendChild(replBtn);

  const alts = getWrapperAlts(bgWrap);
  if (alts.length >= 1) {
    const altBtn = document.createElement('button');
    altBtn.type = 'button';
    altBtn.className = 'bg-edit-btn';
    altBtn.textContent = alts.length > 1 ? `备选 ${alts.length}张` : '备选';
    altBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const img = bgWrap.querySelector('img.page-bg') || bgWrap.querySelector('img');
      showAltPanel(img, alts, null, bgWrap);
    });
    ctrl.appendChild(altBtn);
  }
}

function hydrateBgCtrlAreas() {
  document.querySelectorAll('.bg-edit-ctrl-area').forEach(ctrl => {
    const bgWrap = findBgWrapForCtrl(ctrl);
    if (!bgWrap) return;
    updateBgCtrlArea(ctrl, bgWrap);
  });
}

/** 为缺少蒙层的 img-wrapper 补全「点击替换图片」（动态插入槽位时需单独调用）。root 不传则遍历整页。 */
function ensureImgEditOverlays(rootEl) {
  const root = rootEl || document;
  root.querySelectorAll('.img-wrapper').forEach(wrap => {
    if (wrap.classList.contains('page-bg-wrap')) return;
    if (!wrap.querySelector('.img-edit-overlay')) {
      const overlay = document.createElement('div');
      overlay.className = 'img-edit-overlay';
      const hint = wrap.dataset.slotHint || compositeSlotHint(wrap.dataset.path || '', wrap.dataset.slotLabel || '');
      overlay.innerHTML = `<span class="slot-path">${esc(hint)}</span><span>点击替换图片</span>`;
      overlay.addEventListener('click', () => openImageModal(wrap));
      wrap.appendChild(overlay);
    }
  });
}

function getComponentRootFromWrapper(wrap) {
  if (!wrap) return null;
  return wrap.querySelector(':scope > .roadbook-component[data-component-id]');
}

function buildInsertBetween(insertBeforeSection) {
  const div = document.createElement('div');
  div.className = 'insert-between';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'insert-btn';
  btn.title = '在此处插入组件';
  btn.textContent = '+';
  btn.addEventListener('click', () => {
    showAddComponentPanel(insertBeforeSection);
  });
  div.appendChild(btn);
  return div;
}

function initEditUI() {
  // 给每个 img-wrapper 添加编辑蒙层（通栏章节背景 .page-bg-wrap 除外：蒙层铺满会像灰幕盖住图；换图用右下角「替换背景」）
  ensureImgEditOverlays();

  getComponentWrappers(document.getElementById('components-container')).forEach((wrap) => {
    const sec = getComponentRootFromWrapper(wrap);
    if (!sec || sec.querySelector('.drag-handle')) return;
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '⋮⋮';
    handle.addEventListener('mousedown', () => { sec.draggable = true; });
    sec.appendChild(handle);

    const actions = document.createElement('div');
    actions.className = 'component-actions';
    actions.innerHTML = '<button class="comp-btn comp-btn-delete" title="删除组件">×</button>';
    actions.querySelector('.comp-btn-delete').addEventListener('click', () => {
      deleteComponent(sec);
    });
    sec.appendChild(actions);
  });

  // 填充大标题区块背景浮动控制区（费用/服务说明页不包含 bg-edit-ctrl-area）
  hydrateBgCtrlAreas();

  // 在组件之间添加插入按钮
  addInsertButtons();
  initDragDrop();

  document.querySelectorAll('.roadbook-component.daily-component').forEach((bundle) => {
    decorateDailyImageSlots(bundle);
  });
  document.querySelectorAll('.roadbook-component[data-component-type="feature"].feature-hotel-sheet-section').forEach(initFeatureStayGalleries);
}

// ===== 图片替换 =====
let currentImageWrapper = null;

function openImageModal(wrapper) {
  if (!wrapper) return;
  if (!document.body.classList.contains('editing')) return;
  currentImageWrapper = wrapper;
  const modal = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  const curLabel = wrapper.dataset.slotLabel || '';
  content.innerHTML = `
    <div style="position:relative">
      <h3 class="modal-title">替换图片</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="img-modal-actions">
      <label style="display:block;margin-bottom:6px;font-size:13px;color:#555;">图片 URL</label>
      <input type="text" id="img-url-input" placeholder="输入图片URL..." />
      <label style="display:block;margin-top:14px;margin-bottom:6px;font-size:13px;color:#555;">地点标注（可选，写入 JSON 的 slotLabel）</label>
      <input type="text" id="img-slot-label-input" placeholder="如：肇兴侗寨 · 堂安梯田" value="${esc(curLabel)}" />
      <button class="btn-url" onclick="applyImageUrl()">确认</button>
      <button class="btn-upload" onclick="triggerUpload()">从本地上传</button>
      <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="handleFileUpload(event)" />
    </div>
  `;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function applyImageUrl() {
  const url = document.getElementById('img-url-input').value.trim();
  const slotEl = document.getElementById('img-slot-label-input');
  const slotLabel = slotEl ? slotEl.value.trim() : '';
  if (currentImageWrapper) {
    if (slotLabel) currentImageWrapper.dataset.slotLabel = slotLabel;
    else delete currentImageWrapper.dataset.slotLabel;
    refreshSlotHint(currentImageWrapper);
    if (url) applyImage(currentImageWrapper, url);
  }
  closeModal();
}

function triggerUpload() {
  document.getElementById('img-file-input').click();
}

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    if (currentImageWrapper) {
      const slotEl = document.getElementById('img-slot-label-input');
      const slotLabel = slotEl ? slotEl.value.trim() : '';
      if (slotLabel) currentImageWrapper.dataset.slotLabel = slotLabel;
      else delete currentImageWrapper.dataset.slotLabel;
      refreshSlotHint(currentImageWrapper);
      applyImage(currentImageWrapper, ev.target.result);
    }
    closeModal();
  };
  reader.readAsDataURL(file);
}

function refreshAltButton(wrapper, alts) {
  const list = Array.isArray(alts) ? alts.filter(Boolean) : [];
  if (isTitleBackgroundWrapper(wrapper)) {
    wrapper.querySelectorAll('.img-alt-btn').forEach(b => b.remove());
    return;
  }
  const dupAlts = wrapper.querySelectorAll('.img-alt-btn');
  if (dupAlts.length > 1) {
    for (let i = 1; i < dupAlts.length; i++) dupAlts[i].remove();
  }
  let btn = wrapper.querySelector('.img-alt-btn');
  if (list.length < 1) {
    if (btn) btn.remove();
    return;
  }
  const label = list.length > 1 ? `备选 ${list.length}张` : '备选';
  const payload = esc(JSON.stringify(list));
  if (!btn) {
    wrapper.insertAdjacentHTML('beforeend',
      `<button type="button" class="img-alt-btn" data-alts="${payload}">${label}</button>`);
  } else {
    btn.textContent = label;
    btn.dataset.alts = JSON.stringify(list);
  }
}

function mergeAltsAfterReplace(wrapper, newSrc) {
  let alts = [];
  try {
    alts = wrapper.dataset.alts ? JSON.parse(wrapper.dataset.alts) : [];
  } catch (e) { alts = []; }
  if (!alts.length) {
    alts = [newSrc];
  } else if (!alts.includes(newSrc)) {
    alts = [newSrc, ...alts];
  } else {
    alts = [newSrc, ...alts.filter(u => u !== newSrc)];
  }
  wrapper.dataset.alts = JSON.stringify(alts);
  refreshAltButton(wrapper, alts);
  refreshSlotHint(wrapper);
  refreshBgCtrlForWrapper(wrapper);
}

function applyImage(wrapper, src) {
  mergeAltsAfterReplace(wrapper, src);
  const isTitleBg = isTitleBackgroundWrapper(wrapper);
  if (isTitleBg) {
    applyTitleBackground(wrapper, src);
    return;
  }
  let img = wrapper.querySelector('img.page-bg') || wrapper.querySelector('img.cover-logo') || wrapper.querySelector('img');
  if (img) {
    img.src = src;
    return;
  }
  const placeholder = wrapper.querySelector('.img-placeholder, .cover-img-placeholder, .page-bg-placeholder');
  if (placeholder) placeholder.remove();
  img = document.createElement('img');
  img.src = src;
  img.loading = 'lazy';
  img.decoding = 'async';
  if (wrapper.classList.contains('page-bg-wrap')) {
    img.className = 'page-bg';
    img.alt = '';
  } else if (wrapper.classList.contains('cover-logo-wrap')) {
    img.className = 'cover-logo';
    img.alt = 'Logo';
  } else {
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:12px;display:block;';
  }
  wrapper.insertBefore(img, wrapper.firstChild);
}

/* ========== 备选图片面板（对齐 roadbook v1） ========== */
function showAltPanel(targetImg, alts, altBtn, wrapOverride) {
  const overlay = document.createElement('div');
  overlay.className = 'alt-panel-overlay';
  overlay.innerHTML = `
    <div class="alt-panel">
      <div class="alt-panel-title">
        <span>选择备选图片</span>
        <button type="button" class="alt-panel-close">&times;</button>
      </div>
      <div class="alt-panel-grid">
        ${alts.map(url => `<img src="${esc(url)}" alt="">`).join('')}
      </div>
      <div style="margin-top:12px;text-align:center;">
        <button type="button" class="alt-local-btn">从本地选择图片</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('.alt-panel-close').onclick = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

  overlay.querySelectorAll('.alt-panel-grid img').forEach((gridImg, i) => {
    gridImg.onclick = () => {
      const url = alts[i];
      const wrap = wrapOverride || (altBtn ? altBtn.closest('.img-wrapper') : (targetImg && targetImg.closest('.img-wrapper')));
      if (wrap && url) applyImage(wrap, url);
      overlay.remove();

      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const wrap = wrapOverride || (altBtn ? altBtn.closest('.img-wrapper') : (targetImg && targetImg.closest('.img-wrapper')));
        if (wrap) applyImage(wrap, e.target.result);
        overlay.remove();
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };
}

function showAddComponentPanel(insertBeforeSection) {
  const modal = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  const beforeId = insertBeforeSection ? insertBeforeSection.dataset.componentId : null;
  const existingTypes = new Set(Array.from(document.querySelectorAll('#components-container > .roadbook-component')).map(el => el.dataset.componentType));
  const pickerHtml = Object.entries(COMPONENT_TYPES).map(([type, meta]) => {
    const disabled = meta.allowMultiple === false && existingTypes.has(type);
    const action = meta.subtypes
      ? `showSubtypePicker('${type}', ${beforeId ? `'${beforeId}'` : 'null'})`
      : `addComponent('${type}', null, ${beforeId ? `'${beforeId}'` : 'null'})`;
    return `<div class="picker-item ${disabled ? 'disabled' : ''}" ${disabled ? '' : `onclick="${action}"`}>
      <div class="picker-item-icon">${esc(meta.icon || '')}</div>
      <div class="picker-item-name">${escMd(meta.name)}</div>
      <div class="picker-item-desc">${escMd(meta.description || '')}</div>

    <div style="position:relative">

    </div>
    <div class="component-picker">
      ${pickerHtml}
    </div>

function showSubtypePicker(type, insertBeforeId) {
  const meta = COMPONENT_TYPES[type] || {};
  const subtypes = meta.subtypes || ['其他'];

  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div style="position:relative">
      <h3 class="modal-title">选择${esc(meta.name || '组件')}类型</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="component-picker">
      ${subtypes.map(sub => {

function addComponent(type, subtype, insertBeforeId) {
  closeModal();
  const id = `${type}-${Date.now()}`;
  const comp = createEmptyComponent(type, id, subtype);

  const container = document.getElementById('components-container');
  const tempContainer = document.createElement('div');
  const beforeSec = insertBeforeId
    ? container.querySelector(`[data-component-id="${insertBeforeId}"]`)
    : null;
  const beforeWrap = beforeSec ? beforeSec.closest('.roadbook-component-wrapper') : null;
  const hasDaily = !!container.querySelector('.daily-component');
  const isFirstDaily = comp.type === 'daily' && !hasDaily;

  renderComponent(tempContainer, comp, tripData.components.length, isFirstDaily);

  while (tempContainer.firstChild) {
    if (beforeWrap) {
      container.insertBefore(tempContainer.firstChild, beforeWrap);
    } else {
      container.appendChild(tempContainer.firstChild);
    }
  }

  initEditUI();
  hydrateBgCtrlAreas();
}

function createEmptyComponent(type, id, subtype) {
  const subMeta = getSubtypeMeta(subtype || '其他');
  const st = subtype || '其他';
  if (type === 'text-block' && isTextblockMergedRichSubtype(st)) {
    return {
      type: 'text-block',
      id,
      data: {
        backgroundImage: '',
        title: subMeta.label,
        subtype: st,
        content: st === '费用'
          ? '<p>请在此编辑<strong>费用说明</strong>（整段自由输入；需要条目时可在编辑时插入列表）。</p>'
          : '<p>请在此编辑服务说明。</p>'
      }
    };
  }
  const templates = {
    highlights: { type: 'highlights', id, data: { backgroundImage: '', title: '行程亮点', content: '请填写本次定制行程的核心价值。', items: ['请填写亮点一', '请填写亮点二', '请填写亮点三'] } },
    itinerary: { type: 'itinerary', id, data: { backgroundImage: '', title: '行程概览', style: 'table', items: [{ day: 1, date: '', time: '', title: '', locations: '', transport: '', distance: '', accommodation: '', meals: '' }] } },
    daily: { type: 'daily', id, data: { backgroundImage: '', title: '详细行程', date: 'Day X', theme: '请填写当天主题', description: '请填写行程介绍...', topImages: [], sideImage: '', bottomImages: [] } },
    feature: { type: 'feature', id, data: { backgroundImage: '', title: subtype ? `${subMeta.label}` : '特点介绍', subtype: subtype || '其他', items: [{ title: '请填写标题', description: '请填写介绍内容...', images: [{ url: '', slotLabel: `${subtype || '特点'}配图 1` }] }] } },
    'text-block': { type: 'text-block', id, data: { backgroundImage: '', title: st !== '其他' ? subMeta.label : '文字说明', subtype: st, sections: [{ heading: '请填写小标题', body: '请填写内容...' }] } }
  };
  return templates[type] || templates['text-block'];
}

function deleteComponent(section) {
  const type = section.dataset.componentType;
  const typeName = COMPONENT_TYPES[type]?.name || type;
  if (confirm(`确定删除「${typeName}」模块？此操作不可撤销。`)) {
    const wrap = section.closest('.roadbook-component-wrapper');
    if (wrap) {
      const prev = wrap.previousElementSibling;
      if (prev && prev.classList.contains('insert-between')) {
        prev.remove();
      }
      wrap.remove();
    } else {
      const prev = section.previousElementSibling;
      if (prev && prev.classList.contains('insert-between')) {
        prev.remove();
      }
      section.remove();
    }
  }
}

// ===== 插入按钮 =====
function addInsertButtons() {
  document.querySelectorAll('#components-container > .insert-between').forEach((el) => el.remove());

  const container = document.getElementById('components-container');
  const wrappers = getComponentWrappers(container);

  wrappers.forEach((wrap, i) => {
    if (i === 0) return;
    const sec = getComponentRootFromWrapper(wrap);
    if (!sec) return;
    container.insertBefore(buildInsertBetween(sec), wrap);

// ===== 拖拽排序 =====
let draggedSection = null;
let draggedWrapper = null;

function initDragDrop() {
  const container = document.getElementById('components-container');
  getComponentWrappers(container).forEach((wrap) => {
    const sec = getComponentRootFromWrapper(wrap);
    if (!sec) return;
    sec.addEventListener('dragstart', onDragStart);
    sec.addEventListener('dragover', onDragOver);
    sec.addEventListener('dragleave', onDragLeave);
    sec.addEventListener('drop', onDrop);
    sec.addEventListener('dragend', onDragEnd);
  });
}

function onDragStart(e) {
  if (e.target.closest('.daily-drag-handle')) return;
  draggedSection = e.currentTarget;
  draggedWrapper = draggedSection.closest('.roadbook-component-wrapper');
  if (draggedWrapper) draggedWrapper.classList.add('dragging');
  else draggedSection.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedSection.dataset.componentId);
}

function onDragOver(e) {
  if (dailyDndSrc) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.currentTarget;
  if (target === draggedSection) return;

  const rect = target.getBoundingClientRect();
  const midY = rect.top + rect.height / 2;

  document.querySelectorAll('.drag-above, .drag-below').forEach(el => {
    el.classList.remove('drag-above', 'drag-below');
  });

  if (e.clientY < midY) {
    target.classList.add('drag-above');
  } else {
    target.classList.add('drag-below');
  }
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-above', 'drag-below');
}

function onDrop(e) {
  if (dailyDndSrc) return;
  e.preventDefault();
  const target = e.currentTarget;
  if (target === draggedSection || !draggedSection || !draggedWrapper) return;

  const targetWrap = target.closest('.roadbook-component-wrapper');
  if (!targetWrap || targetWrap === draggedWrapper) return;

  const container = document.getElementById('components-container');
  const rect = target.getBoundingClientRect();
  const midY = rect.top + rect.height / 2;

  if (e.clientY < midY) {
    container.insertBefore(draggedWrapper, targetWrap);
  } else {
    let next = targetWrap.nextElementSibling;
    while (next && next.classList.contains('insert-between')) {
      next = next.nextElementSibling;
    }
    if (next) container.insertBefore(draggedWrapper, next);
    else container.appendChild(draggedWrapper);
  }

  clearDragStyles();
  addInsertButtons();
}

function onDragEnd(e) {
  e.currentTarget.draggable = false;
  clearDragStyles();
}

function clearDragStyles() {
  if (draggedWrapper) {
    draggedWrapper.classList.remove('dragging');
    draggedWrapper = null;
  }
  if (draggedSection) {
    draggedSection.classList.remove('dragging');
    draggedSection = null;
  }
  document.querySelectorAll('.drag-above, .drag-below').forEach(el => {
    el.classList.remove('drag-above', 'drag-below');
  });
}

// ===== 数据收集与保存 =====
function setByPath(obj, pathStr, value) {
  const segs = pathStr.split('/').filter(Boolean);
  let cur = obj;
  for (let i = 0; i < segs.length - 1; i++) {
    const key = isNaN(segs[i]) ? segs[i] : parseInt(segs[i]);
    if (cur[key] == null) {
      cur[key] = isNaN(segs[i + 1]) ? {} : [];
    }
    cur = cur[key];
  }
  const lastKey = isNaN(segs[segs.length - 1]) ? segs[segs.length - 1] : parseInt(segs[segs.length - 1]);
  cur[lastKey] = value;
}

function normalizePersistedImageUrl(url) {
  let s = resolveExportMediaUrl(String(url || '').trim());
  if (!s || s.includes('placehold')) return '';
  if (/^file:\/\//i.test(s)) return '';
  return s;
}


function packImageValue(urlsOrdered, slotLabel) {
  const sl = (slotLabel || '').trim();
  const uniq = urlsOrdered.map(normalizePersistedImageUrl).filter(Boolean);
  if (!sl) {
    if (!uniq.length) return '';
    if (uniq.length === 1) return uniq[0];
    return uniq;
  }
  if (!uniq.length) return { url: '', slotLabel: sl };
  if (uniq.length === 1) return { url: uniq[0], slotLabel: sl };
  return { alternates: uniq, slotLabel: sl };
}

function buildImageValueFromWrapper(wrap) {
  let alts = [];
  try {
    alts = wrap.dataset.alts ? JSON.parse(wrap.dataset.alts) : [];
  } catch (e) { alts = []; }
  const img = wrap.querySelector('img.page-bg') || wrap.querySelector('img.cover-logo') || wrap.querySelector('img');
  let current = '';
  if (img && img.src && !img.src.includes('placehold')) current = normalizePersistedImageUrl(img.src);

  const slotLabel = (wrap.dataset.slotLabel || '').trim();
  alts = alts.map(normalizePersistedImageUrl).filter(Boolean);

  if (!alts.length) return packImageValue([current], slotLabel);

  const rest = alts.filter(u => u !== current);
  const ordered = [current, ...rest].filter(Boolean);
  const uniq = [...new Set(ordered)];
  return packImageValue(uniq, slotLabel);
}

function escapeCssAttr(value) {
  return typeof CSS !== 'undefined' && CSS.escape
    ? CSS.escape(String(value))
    : String(value).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

/** 逻辑组件外包一层 .roadbook-component-wrapper，非 #components-container 直接子节点 */
function getComponentWrappers(container) {
  if (!container) return [];
  return Array.from(container.querySelectorAll(':scope > .roadbook-component-wrapper'));
}

function countRenderedComponents(container) {
  return getComponentWrappers(container).length;
}

function collectComponentIdOrder(container) {
  const idOrder = [];
  const seenId = new Set();
  getComponentWrappers(container).forEach((wrap) => {
    const root = wrap.querySelector('.roadbook-component[data-component-id]');
    const id = root?.dataset?.componentId;
    if (id && !seenId.has(id)) {
      seenId.add(id);
      idOrder.push(id);
    }
  });
  return idOrder;
}

function getComponentSections(container, cid) {
  const sel = `.roadbook-component[data-component-id="${escapeCssAttr(cid)}"]`;
  const wrap = getComponentWrappers(container).find((w) => w.querySelector(sel));
  return wrap ? Array.from(wrap.querySelectorAll(sel)) : [];
}

function collectData() {
  const data = {
    meta: { ...tripData.meta, updatedAt: new Date().toISOString() },
    cover: tripData.cover ? { ...tripData.cover } : {},
    components: []
  };

  const coverSec = document.querySelector('.cover-section');
  if (coverSec) {
    coverSec.querySelectorAll('.img-wrapper[data-path]').forEach(wrap => {
      const p = wrap.dataset.path;
      const val = buildImageValueFromWrapper(wrap);
      if (p === '/cover/backgroundImage') data.cover.backgroundImage = val;
      if (p === '/cover/logo') data.cover.logo = val;
    });
    const titleEl = coverSec.querySelector('[data-field="title"]');
    const subtitleEl = coverSec.querySelector('[data-field="subtitle"]');
    data.cover.title = titleEl
      ? (titleEl.dataset.copyMd === '1' ? htmlInlineToMarkdownBold(titleEl).trim() : titleEl.textContent.trim())
      : '';
    let sub = subtitleEl
      ? (subtitleEl.dataset.copyMd === '1' ? htmlInlineToMarkdownBold(subtitleEl).trim() : subtitleEl.textContent.trim())
      : '';
    if (shouldOmitCoverSubtitle(sub)) sub = '';
    data.cover.subtitle = sub;
  }

  const container = document.getElementById('components-container');
  const idOrder = collectComponentIdOrder(container);

  idOrder.forEach(cid => {
    const secs = getComponentSections(container, cid);
    if (!secs.length) return;
    const origComp = tripData.components.find(c => c.id === cid);
    const comp = {
      type: secs[0].dataset.componentType,
      id: cid,
      data: origComp && origComp.data ? JSON.parse(JSON.stringify(origComp.data)) : {}
    };

    secs.forEach(sec => {
      sec.querySelectorAll('[data-field]').forEach(el => {
        const field = el.dataset.field;
        if (!field) return;
        const val = el.dataset.rich === '1'
          ? el.innerHTML.trim()
          : el.dataset.copyMd === '1'
            ? htmlInlineToMarkdownBold(el).trim()
            : el.textContent.trim();
        setByPath(comp.data, field, val);
      });
      sec.querySelectorAll('.img-wrapper[data-path]').forEach(wrap => {
        const path = wrap.dataset.path;
        if (!path || path.startsWith('/cover')) return;
        const val = buildImageValueFromWrapper(wrap);
        if (path && val !== undefined && val !== '') {
          setByPath(comp.data, path, val);
        }
      });
    });

    if (comp.type === 'text-block' && isTextblockMergedRichSubtype(comp.data.subtype)) {
      const host = secs[0];
      if (host) {
        const rich = host.querySelector('.textblock-rich-editor[data-field="content"]')
          || host.querySelector('.textblock-rich[data-field="content"]');
        comp.data.content = rich ? rich.innerHTML.trim() : '';
        delete comp.data.lines;
        delete comp.data.sections;
      }
    }

    if (comp.type === 'highlights') {
      const host = secs[0];
      const itemTexts = Array.from(host.querySelectorAll('.highlights-item-text'))
        .map(el => htmlInlineToMarkdownBold(el).trim())
        .filter(Boolean);
      comp.data.items = itemTexts;
      const contentEl = host.querySelector('.highlights-content');
      comp.data.content = contentEl ? htmlInlineToMarkdownBold(contentEl).trim() : '';
    }

    if (comp.type === 'daily') {
      const host = secs[0];
      const topWraps = Array.from(host.querySelectorAll('.daily-top-images .img-wrapper'));
      const rightWraps = Array.from(host.querySelectorAll('.daily-right-column .img-wrapper'));

      const topValues = topWraps
        .map(wrap => buildImageValueFromWrapper(wrap))
        .filter(val => val !== '' && val !== undefined && val !== null);

      const rightValues = rightWraps
        .map(wrap => buildImageValueFromWrapper(wrap))
        .filter(val => val !== '' && val !== undefined && val !== null);

      comp.data.topImages = topValues.slice(0, 3);
      comp.data.sideImage = rightValues[0] || '';
      comp.data.bottomImages = rightValues.slice(1, 8);
    }

    if (comp.type === 'feature' && Array.isArray(comp.data.items)) {
      const host = secs[0];
      const cards = host.querySelectorAll('.feature-hotel-sheet');
      if (cards.length) {
        cards.forEach((card, idx) => {
          const gallery = card.querySelector('.feature-hotel-gallery');
          if (!gallery || !comp.data.items[idx]) return;
          const wraps = Array.from(gallery.querySelectorAll(':scope > .img-wrapper'));
          const vals = wraps
            .map(w => buildImageValueFromWrapper(w))
            .filter(v => v !== '' && v !== undefined && v !== null);
          comp.data.items[idx].images = vals.slice(0, STAY_GALLERY_MAX);
        });
      }
    }

    data.components.push(comp);
  });

  if (idOrder.length === 0 && Array.isArray(tripData.components) && tripData.components.length > 0) {
    data.components = JSON.parse(JSON.stringify(tripData.components));
  }

  return data;
}

function saveData() {
  const container = document.getElementById('components-container');
  const domComponentCount = countRenderedComponents(container);
  if (domComponentCount === 0) {
    const memCount = Array.isArray(tripData.components) ? tripData.components.length : 0;
    if (memCount > 0) {
      alert('行程章节未显示在页面上，已取消保存，避免清空 tripData。请刷新页面（F5）确认路书完整后再保存。');
    } else {
      alert('当前没有任何行程章节，无法保存。请刷新页面；若仍只有封面，说明 tripData.json 已被清空，需先恢复数据。');
    }
    return;
  }
  const data = collectData();
  const json = JSON.stringify(data, null, 2);

  fetch('/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: json
  }).then(res => {
    if (res.ok) {
      exitEditMode();
      alert('保存成功！');
    } else {
      throw new Error('Server save failed');
    }
  }).catch(() => {
    // 降级为下载
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tripData.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    exitEditMode();
    alert('已下载 tripData.json（未连接预览服务）。');
  });
}

const ROADBOOK_EXPORT_WIDTH_PX = 1200;

const EXPORT_CAPTURE_NEUTRALIZE_CSS = `
  *, *::before, *::after {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    box-shadow: none !important;
    text-shadow: none !important;
  }
  .page-bg-wrap .page-bg, img { filter: none !important; }
  .page-overlay {
    background: linear-gradient(180deg, rgba(26,35,50,0.18) 0%, rgba(26,35,50,0.32) 100%) !important;
  }
  .highlights-card { background: rgba(255, 255, 255, 0.97) !important; }
`;

const EXPORT_CAPTURE_LAYOUT_CSS = `
  body.exporting .roadbook-container,
  body.exporting #cover-container,
  body.exporting #cover-container .cover-section,
  body.exporting #components-container,
  body.exporting #components-container > .roadbook-component-wrapper {
    width: ${ROADBOOK_EXPORT_WIDTH_PX}px !important;
    max-width: ${ROADBOOK_EXPORT_WIDTH_PX}px !important;
    min-width: ${ROADBOOK_EXPORT_WIDTH_PX}px !important;
    box-sizing: border-box !important;
    overflow: visible !important;
    height: auto !important;
    min-height: 0 !important;
  }
  body.exporting .page-section,
  body.exporting .daily-content-page,
  body.exporting .cover-section {
    min-height: 0 !important;
    height: auto !important;
    overflow: visible !important;
  }
  body.exporting .cover-section {
    display: flex !important;
    flex-direction: row !important;
    align-items: stretch !important;
  }
  body.exporting .cover-left > .img-wrapper.cover-bg {
    position: relative !important;
    inset: auto !important;
    width: 100% !important;
    height: auto !important;
    min-height: 480px !important;
    aspect-ratio: 4 / 5 !important;
  }
`;

function injectExportCaptureStyles(doc) {
  const d = doc || document;
  let style = d.getElementById('roadbook-export-capture-style');
  if (!style) {
    style = d.createElement('style');
    style.id = 'roadbook-export-capture-style';
    d.head.appendChild(style);
  }
  style.textContent = `${EXPORT_CAPTURE_NEUTRALIZE_CSS}\n${EXPORT_CAPTURE_LAYOUT_CSS}`;
}

function rewriteExportMediaUrlsInTree(root) {
  const scope = root || document;
  scope.querySelectorAll('img[src]').forEach((img) => {
    const raw = img.currentSrc || img.getAttribute('src') || '';
    const resolved = resolveExportMediaUrl(raw);
    if (!resolved || resolved === raw) return;
    if (!img.dataset.roadbookOrigSrc) img.dataset.roadbookOrigSrc = raw;
    img.src = resolved;
    img.setAttribute('crossorigin', 'anonymous');
    img.setAttribute('referrerpolicy', 'no-referrer');
  });
  scope.querySelectorAll('[style*="background-image"]').forEach((el) => {
    const bg = el.style.getPropertyValue('background-image') || el.style.backgroundImage || '';
    const m = bg.match(/url\(\s*['"]?([^'")]+)['"]?\s*\)/i);
    if (!m) return;
    const resolved = resolveExportMediaUrl(m[1]);
    if (!resolved || resolved === m[1]) return;
    if (!el.dataset.roadbookOrigBg) el.dataset.roadbookOrigBg = bg;
    el.style.setProperty('background-image', cssBgUrlValue(resolved), 'important');
  });
}

function rewriteUnembeddedRemoteImagesToProxy(root) {
  const scope = root || document;
  scope.querySelectorAll('img[src]').forEach((img) => {
    if (img.dataset.roadbookInlineSrc) return;
    const raw = img.currentSrc || img.getAttribute('src') || '';
    const proxied = proxyExportMediaUrl(resolveExportMediaUrl(raw));
    if (!proxied || proxied === raw) return;
    if (!img.dataset.roadbookOrigSrc) img.dataset.roadbookOrigSrc = raw;
    img.src = proxied;
    img.setAttribute('crossorigin', 'anonymous');
    img.setAttribute('referrerpolicy', 'no-referrer');
  });
  scope.querySelectorAll('[style*="background-image"]').forEach((el) => {
    const bg = el.style.getPropertyValue('background-image') || el.style.backgroundImage || '';
    const m = bg.match(/url\(\s*['"]?([^'")]+)['"]?\s*\)/i);
    if (!m || m[1].startsWith('data:')) return;
    const proxied = proxyExportMediaUrl(resolveExportMediaUrl(m[1]));
    if (!proxied || proxied === m[1]) return;
    if (!el.dataset.roadbookOrigBg) el.dataset.roadbookOrigBg = bg;
    el.style.setProperty('background-image', cssBgUrlValue(proxied), 'important');
  });
}

function restoreExportMediaUrlsInTree(root) {
  const scope = root || document;
  scope.querySelectorAll('img[data-roadbook-orig-src]').forEach((img) => {
    if (img.dataset.roadbookInlineSrc) return;
    img.src = img.dataset.roadbookOrigSrc;
    delete img.dataset.roadbookOrigSrc;
  });
  scope.querySelectorAll('[data-roadbook-orig-bg]').forEach((el) => {
    el.style.backgroundImage = el.dataset.roadbookOrigBg;
    delete el.dataset.roadbookOrigBg;
  });
}

async function embedImagesAsDataUrls(root) {
  const scope = root || document;
  const imgs = Array.from(scope.querySelectorAll('img[src]'));
  await Promise.all(imgs.map(async (img) => {
    const raw = img.currentSrc || img.getAttribute('src') || '';
    const src = resolveExportMediaUrl(raw);
    if (src !== raw) img.src = src;
    if (!src || src.startsWith('data:') || src.startsWith('blob:') || img.dataset.roadbookInlineSrc) return;
    let fetchUrl = src;
    try {
      fetchUrl = new URL(src, document.baseURI || window.location.href).href;
    } catch (_) { /* keep src */ }
    try {
      const res = await fetch(fetchUrl, { credentials: 'same-origin' });
      if (!res.ok) return;
      const blob = await res.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      if (!img.dataset.roadbookOrigSrc) img.dataset.roadbookOrigSrc = raw;
      img.dataset.roadbookInlineSrc = '1';
      img.src = String(dataUrl);
    } catch (_) { /* 保留已归一化的 src */ }
  }));
  scope.querySelectorAll('[style*="background-image"]').forEach((el) => {
    const bg = el.style.getPropertyValue('background-image') || el.style.backgroundImage || '';
    const m = bg.match(/url\(\s*['"]?([^'")]+)['"]?\s*\)/i);
    if (!m || m[1].startsWith('data:')) return;
    const resolved = resolveExportMediaUrl(m[1]);
    if (!resolved || resolved === m[1]) return;
    if (!el.dataset.roadbookOrigBg) el.dataset.roadbookOrigBg = bg;
    el.style.setProperty('background-image', cssBgUrlValue(resolved), 'important');
  });
}

function waitForImagesDecoded(root) {
  const imgs = Array.from((root || document).querySelectorAll('img[src]'));
  return Promise.all(imgs.map((img) => {
    if (img.complete && img.naturalWidth > 0) return Promise.resolve();
    if (typeof img.decode === 'function') {
      return img.decode().catch(() => undefined);
    }
    return new Promise((resolve) => {
      img.addEventListener('load', resolve, { once: true });
      img.addEventListener('error', resolve, { once: true });
    });
  }));
}

function restoreEmbeddedImages(root) {
  (root || document).querySelectorAll('img[data-roadbook-inline-src]').forEach((img) => {
    if (img.dataset.roadbookOrigSrc) img.src = img.dataset.roadbookOrigSrc;
    delete img.dataset.roadbookOrigSrc;
    delete img.dataset.roadbookInlineSrc;
  });
}

/** PDF 分片：#cover-container > .cover-section，#components-container > .roadbook-component-wrapper */
function getRoadbookPdfSliceElements() {
  const slices = [];
  const coverContainer = document.getElementById('cover-container');
  if (coverContainer) {
    coverContainer.querySelectorAll(':scope > .cover-section').forEach((el) => slices.push(el));
  }
  const componentsContainer = document.getElementById('components-container');
  if (componentsContainer) {
    componentsContainer.querySelectorAll(':scope > .roadbook-component-wrapper').forEach((el) => slices.push(el));
  }
  return slices;
}

function normalizeCanvasToExportWidth(canvas, targetWidth, bgColor) {
  const w = Math.max(1, canvas.width);
  const targetW = Math.max(1, targetWidth);
  if (w === targetW) return canvas;
  const targetH = Math.max(1, Math.round(canvas.height * targetW / w));
  const out = document.createElement('canvas');
  out.width = targetW;
  out.height = targetH;
  const ctx = out.getContext('2d');
  if (!ctx) return canvas;
  ctx.fillStyle = bgColor || '#ffffff';
  ctx.fillRect(0, 0, targetW, targetH);
  ctx.drawImage(canvas, 0, 0, w, canvas.height, 0, 0, targetW, targetH);
  return out;
}

function stitchCanvasSlices(slices, bgColor) {
  const outW = Math.max(1, ...slices.map((s) => s.width));
  let outH = 0;
  slices.forEach((s) => { outH += s.height; });
  const out = document.createElement('canvas');
  out.width = outW;
  out.height = outH;
  const ctx = out.getContext('2d');
  if (!ctx) throw new Error('无法创建拼接画布');
  ctx.fillStyle = bgColor || '#ffffff';
  ctx.fillRect(0, 0, outW, outH);
  let dy = 0;
  slices.forEach((s) => {
    const x = Math.floor((outW - s.width) / 2);
    ctx.drawImage(s, 0, 0, s.width, s.height, x, dy, s.width, s.height);
    dy += s.height;
  });
  return out;
}

/**
 * 按 DOM 分片逐块 html2canvas，归一化到 1200px 宽后纵向拼成一张长图 canvas。
 */
async function captureAndStitchRoadbookCanvas(options = {}) {
  const bg = options.backgroundColor
    || getComputedStyle(document.body).backgroundColor
    || '#f7f8fa';
  const scale = options.scale ?? Math.min(2, window.devicePixelRatio || 2);
  const windowWidth = ROADBOOK_EXPORT_WIDTH_PX;
  const slices = getRoadbookPdfSliceElements();
  if (!slices.length) throw new Error('未找到可导出的封面或行程分片');

  injectExportCaptureStyles(document);
  const blockCanvases = [];

  for (let i = 0; i < slices.length; i++) {
    const el = slices[i];
    try {
      el.scrollIntoView({ block: 'start', behavior: 'instant' });
    } catch (_) {
      el.scrollIntoView(true);
    }
    await new Promise((r) => setTimeout(r, 100));
    await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

    const raw = await html2canvas(el, {
      scale,
      backgroundColor: bg,
      useCORS: true,
      allowTaint: false,
      logging: false,
      windowWidth,
      windowHeight: window.innerHeight,
      onclone: (clonedDoc) => {
        clonedDoc.body.classList.add('exporting');
        injectExportCaptureStyles(clonedDoc);
        rewriteUnembeddedRemoteImagesToProxy(clonedDoc);
      }
    });
    const normalized = normalizeCanvasToExportWidth(raw, ROADBOOK_EXPORT_WIDTH_PX, bg);
    blockCanvases.push(normalized);
    console.info(`[roadbook] capture block ${i + 1}/${slices.length}:`, {
      raw: `${raw.width}x${raw.height}`,
      normalized: `${normalized.width}x${normalized.height}`
    });
  }

  const merged = stitchCanvasSlices(blockCanvases, bg);
  console.info('[roadbook] stitched canvas:', {
    width: merged.width,
    height: merged.height,
    blocks: blockCanvases.length
  });
  return merged;
}

/**
 * 打印 / 另存为 PDF 前：取消 lazy、触发视口内加载，并等待网络完成。
 * 否则大量 <img loading="lazy"> 在未滚动到的区域不会加载，PDF 会大面积缺图。
 */
async function ensureAllImagesReadyForPrint(root) {
  const scope = root || document;
  const imgs = Array.from(scope.querySelectorAll('img[src]'));
  imgs.forEach((img) => {
    img.loading = 'eager';
    img.removeAttribute('loading');
    img.decoding = 'sync';
  });
  // 兜底：滚到底再回顶，促使曾处于懒加载队列的图片开始请求
  try {
    window.scrollTo(0, document.documentElement.scrollHeight);
    await new Promise((r) => requestAnimationFrame(r));
    await new Promise((r) => setTimeout(r, 120));
    window.scrollTo(0, 0);
  } catch (_) { /* ignore */ }
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (_) { /* ignore */ }
  }
  await Promise.all(
    imgs.map((img) => {
      if (img.complete) return Promise.resolve();
      return new Promise((resolve) => {
        img.addEventListener('load', resolve, { once: true });
        img.addEventListener('error', resolve, { once: true });
      });
    })
  );
}
function getDefaultRoadbookExportOptions(overrides = {}) {
  const bg = getComputedStyle(document.body).backgroundColor;
  return {
    scale: Math.min(2, window.devicePixelRatio || 2),
    backgroundColor: (bg && bg !== 'rgba(0, 0, 0, 0)') ? bg : '#f7f8fa',
    ...overrides
  };
}

function getRoadbookPdfFilename() {
  const title = (tripData && tripData.meta && tripData.meta.title) || document.title || '路书';
  const safe = String(title).replace(/[\\/:*?"<>|]/g, '_').trim() || '路书';
  return `${safe}.pdf`;
}

function getRoadbookPngFilename() {
  const title = (tripData && tripData.meta && tripData.meta.title) || document.title || '路书';
  const safe = String(title).replace(/[\\/:*?"<>|]/g, '_').trim() || '路书';
  return safe.endsWith('.png') ? safe : `${safe}.png`;
}

async function prepareRoadbookExport(root) {
  const scope = root || document.querySelector('.roadbook-container') || document.body;
  await ensureAllImagesReadyForPrint(scope);
  rewriteExportMediaUrlsInTree(scope);
  await embedImagesAsDataUrls(scope);
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (_) { /* ignore */ }
  }
  injectExportCaptureStyles(document);
}

/** 与 PDF 共用：预加载 → 分块截图 → 拼接长图（exporting 样式由调用方加 body.exporting） */
async function buildRoadbookStitchedExportCanvas(options = {}) {
  const root = document.querySelector('.roadbook-container') || document.body;
  const opts = getDefaultRoadbookExportOptions(options);
  await prepareRoadbookExport(root);
  rewriteUnembeddedRemoteImagesToProxy(root);
  await waitForImagesDecoded(root);
  try {
    return await captureAndStitchRoadbookCanvas(opts);
  } finally {
    restoreEmbeddedImages(root);
    restoreExportMediaUrlsInTree(root);
  }
}

function downloadStitchedCanvasAsPng(canvas, filename) {
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (!blob) {
        reject(new Error('生成图片失败'));
        return;
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || getRoadbookPngFilename();
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      resolve();
    }, 'image/png');
  });
}

/**
 * 将拼接后的长图 canvas 整页写入 PDF（单页，页尺寸=长图尺寸，不做 A4 切分）。
 */
function exportMergedCanvasToPdf(mergedCanvas, options = {}) {
  const { jsPDF } = window.jspdf;
  const imageQuality = options.imageQuality ?? 0.96;
  const pageWidth = Math.max(1, mergedCanvas.width);
  const pageHeight = Math.max(1, mergedCanvas.height);

  console.info('[roadbook] exportPdfFromStitched:', {
    canvasWidth: pageWidth,
    canvasHeight: pageHeight,
    singlePage: true
  });

  const pdf = new jsPDF({
    orientation: 'p',
    unit: 'px',
    format: [pageWidth, pageHeight],
    compress: true
  });

  pdf.addImage(
    mergedCanvas.toDataURL('image/jpeg', imageQuality),
    'JPEG',
    0,
    0,
    pageWidth,
    pageHeight
  );

  pdf.save(options.filename || getRoadbookPdfFilename());
  return pdf;
}

/** 分块截图 → 拼成长图 → 再导出 PDF */
async function exportRoadbookToPdf(options = {}) {
  const merged = await buildRoadbookStitchedExportCanvas(options);
  return exportMergedCanvasToPdf(merged, options);
}

async function exportRoadbookImage() {
  const root = document.querySelector('.roadbook-container');
  if (!root) return;
  if (typeof html2canvas !== 'function') {
    alert('未加载 html2canvas，请联网后重试。');
    return;
  }

  const btn = document.querySelector('.toolbar .btn-image');
  const prevLabel = btn ? btn.textContent : '';
  const prevEditing = document.body.classList.contains('editing');
  if (prevEditing) document.body.classList.remove('editing');

  document.body.classList.add('exporting');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '导出中...';
  }

  try {
    const canvas = await buildRoadbookStitchedExportCanvas(getDefaultRoadbookExportOptions());
    await downloadStitchedCanvasAsPng(canvas, getRoadbookPngFilename());
  } catch (e) {
    console.error('[roadbook] exportRoadbookImage:', e);
    alert('导出图片失败：' + (e && e.message ? e.message : String(e)));
  } finally {
    document.body.classList.remove('exporting');
    if (btn) {
      btn.disabled = false;
      btn.textContent = prevLabel || '导出图片';
    }
    if (prevEditing) document.body.classList.add('editing');
  }
}

async function exportPDF() {
  if (typeof html2canvas !== 'function' || !window.jspdf) {
    alert('导出依赖还没加载成功，请确认当前浏览器可以访问 CDN 后刷新页面。');
    return;
  }

  const btn = document.querySelector('.toolbar .btn-export');
  const prevLabel = btn ? btn.textContent : '';
  const prevEditing = document.body.classList.contains('editing');
  if (prevEditing) document.body.classList.remove('editing');

  document.body.classList.add('exporting');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '导出中...';
  }

  try {
    await exportRoadbookToPdf();
  } catch (e) {
    console.error('[roadbook] exportPDF:', e);
    alert('导出 PDF 失败：' + (e && e.message ? e.message : String(e)));
  } finally {
    document.body.classList.remove('exporting');
    if (btn) {
      btn.disabled = false;
      btn.textContent = prevLabel || '导出PDF';
    }
    if (prevEditing) document.body.classList.add('editing');
  }
}
